<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARAMANT — Secure Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0c0c;--surface:#111;--border:#1a1a1a;--text:#ededed;--muted:#888;--quiet:#555;--green:#2d6a4f;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;--mono:'SF Mono','Fira Code','Cascadia Code',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column}
</style>
</head>
<body>
<div id="root" style="flex:1;display:flex;flex-direction:column"></div>
<script>
const V={bg:"#0c0c0c",sur:"#111",b:"#1a1a1a",t:"#ededed",m:"#888",q:"#555",g:"#2d6a4f",
  font:"-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif",
  mono:"'SF Mono','Fira Code','Cascadia Code',monospace"};

let apiKey="",ws=null,room="",handle="",messages=[];

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;")}

async function validateKey(key){
  try{
    const r=await fetch("https://health.paramant.app/v2/check-key?k="+key,{signal:AbortSignal.timeout(5000)});
    const d=await r.json();return (d.valid && ["chat","pro","enterprise"].includes(d.plan))?d:{valid:false,reason:"This key does not include chat access. Upgrade at paramant.app/#pricing"};
  }catch{return false}
}

function renderLogin(){
  document.getElementById("root").innerHTML=`
  <nav style="display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;border-bottom:1px solid ${V.b};flex-shrink:0">
    <a href="/" style="font-family:${V.mono};font-size:13px;font-weight:500;letter-spacing:.08em;color:${V.t};text-decoration:none">PARAMANT</a>
    <span style="font-size:12px;color:${V.q};font-family:${V.mono}">/ secure chat</span>
  </nav>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px">
    <div style="width:100%;max-width:360px">
      <h2 style="font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:8px">Secure chat</h2>
      <p style="font-size:13px;color:${V.m};margin-bottom:32px;line-height:1.6">End-to-end encrypted. Zero logs. For legal professionals, whistleblowers, and organisations that require confidential communication.</p>
      <label style="display:block;font-size:11px;font-family:${V.mono};color:${V.q};letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">API key</label>
      <input id="ki" placeholder="pgp_..." style="width:100%;background:${V.sur};border:1px solid ${V.b};border-radius:5px;padding:10px 14px;color:${V.t};font-size:13px;outline:none;margin-bottom:16px;font-family:${V.mono}">
      <label style="display:block;font-size:11px;font-family:${V.mono};color:${V.q};letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Room ID</label>
      <input id="ri" placeholder="case-2026-001" style="width:100%;background:${V.sur};border:1px solid ${V.b};border-radius:5px;padding:10px 14px;color:${V.t};font-size:13px;outline:none;margin-bottom:16px;font-family:${V.mono}">
      <label style="display:block;font-size:11px;font-family:${V.mono};color:${V.q};letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Handle</label>
      <input id="hi" placeholder="counsel-a" style="width:100%;background:${V.sur};border:1px solid ${V.b};border-radius:5px;padding:10px 14px;color:${V.t};font-size:13px;outline:none;margin-bottom:24px;font-family:${V.mono}">
      <button onclick="doLogin()" style="width:100%;background:${V.t};color:${V.bg};border:none;border-radius:5px;padding:11px;font-size:13px;font-weight:500;cursor:pointer">Enter room</button>
      <p id="err" style="font-size:12px;color:#8c3a3a;margin-top:12px;text-align:center"></p>
      <p style="font-size:11px;color:${V.q};margin-top:24px;text-align:center;line-height:1.6">No API key? <a href="/#pricing" style="color:${V.m}">Get one at paramant.app</a></p>
    </div>
  </div>`;
  document.getElementById("ki").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("ri").focus()});
  document.getElementById("ri").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("hi").focus()});
  document.getElementById("hi").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
}

async function doLogin(){
  const k=document.getElementById("ki").value.trim();
  const r=document.getElementById("ri").value.trim();
  const h=document.getElementById("hi").value.trim();
  const err=document.getElementById("err");
  if(!k.startsWith("pgp_")){err.textContent="Invalid API key format";return}
  if(!r){err.textContent="Room ID required";return}
  if(!h){err.textContent="Handle required";return}
  err.textContent="Validating...";
  const valid=await validateKey(k);
  if(valid===false){err.textContent="API key invalid or relay unreachable";return}
if(!valid.valid){err.textContent=valid.reason||"No chat access for this plan";return}
  apiKey=k;room=r;handle=h;
  renderChat();connectWS();
}

function connectWS(){
  const wsBase="wss://health.paramant.app";
  try{
    ws=new WebSocket(wsBase+"/v2/stream?k="+apiKey+"&room="+encodeURIComponent(room)+"&handle="+encodeURIComponent(handle));
    ws.onopen=()=>{addMsg("system","Connected to room: "+room)};
    ws.onmessage=e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.type==="message")addMsg(d.from,d.text,d.ts);
        else if(d.type==="join")addMsg("system",d.handle+" joined");
        else if(d.type==="leave")addMsg("system",d.handle+" left");
      }catch{}
    };
    ws.onclose=()=>{addMsg("system","Disconnected — reconnecting in 3s...");setTimeout(connectWS,3000)};
    ws.onerror=()=>{addMsg("system","Connection error")};
  }catch(e){addMsg("system","WebSocket not available")}
}

function addMsg(from,text,ts){
  messages.push({from,text,ts:ts||new Date().toISOString()});
  if(messages.length>200)messages.shift();
  renderMessages();
}

function renderMessages(){
  const el=document.getElementById("msg-list");
  if(!el)return;
  el.innerHTML=messages.map(m=>{
    const isSystem=m.from==="system";
    const isMe=m.from===handle;
    const t=m.ts?m.ts.slice(11,19):"";
    if(isSystem)return`<div style="text-align:center;font-size:11px;color:${V.q};font-family:${V.mono};padding:8px 0">${esc(m.text)}</div>`;
    return`<div style="margin-bottom:12px">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:2px">
        <span style="font-size:11px;font-family:${V.mono};color:${isMe?V.g:V.m};font-weight:500">${esc(m.from)}</span>
        <span style="font-size:10px;color:${V.q};font-family:${V.mono}">${t}</span>
      </div>
      <div style="font-size:13px;color:${isMe?V.t:V.m};line-height:1.5;max-width:600px">${esc(m.text)}</div>
    </div>`;
  }).join("");
  el.scrollTop=el.scrollHeight;
}

function sendMsg(){
  const inp=document.getElementById("msg-input");
  const text=inp.value.trim();
  if(!text||!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({type:"message",text,room,handle}));
  addMsg(handle,text);
  inp.value="";
}

function renderChat(){
  document.getElementById("root").innerHTML=`
  <nav style="display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid ${V.b};flex-shrink:0">
    <div style="display:flex;align-items:center;gap:16px">
      <a href="/" style="font-family:${V.mono};font-size:13px;font-weight:500;letter-spacing:.08em;color:${V.t};text-decoration:none">PARAMANT</a>
      <span style="font-size:12px;color:${V.q};font-family:${V.mono}"># ${esc(room)}</span>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <span style="font-size:11px;color:${V.g};font-family:${V.mono}">${esc(handle)}</span>
      <button onclick="logout()" style="background:none;border:1px solid ${V.b};color:${V.q};border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer">Leave</button>
    </div>
  </nav>
  <div id="msg-list" style="flex:1;overflow-y:auto;padding:24px 32px"></div>
  <div style="border-top:1px solid ${V.b};padding:16px 32px;display:flex;gap:12px;flex-shrink:0">
    <input id="msg-input" placeholder="Type a message..." style="flex:1;background:${V.sur};border:1px solid ${V.b};border-radius:5px;padding:10px 14px;color:${V.t};font-size:13px;outline:none">
    <button onclick="sendMsg()" style="background:${V.t};color:${V.bg};border:none;border-radius:5px;padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer">Send</button>
  </div>`;
  document.getElementById("msg-input").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey)sendMsg()});
  renderMessages();
}

function logout(){apiKey="";if(ws)ws.close();ws=null;messages=[];renderLogin()}
renderLogin();
</script>
</body>
</html>
