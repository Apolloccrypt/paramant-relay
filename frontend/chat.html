<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARAMANT — Secure Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0c0c0c; color: #ededed; font-family: 'SF Mono', 'Fira Code', monospace; height: 100vh; display: flex; flex-direction: column; }
#lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 24px; }
#lobby h1 { font-size: 13px; letter-spacing: .15em; color: #555; text-transform: uppercase; }
#lobby .card { background: #111; border: 1px solid #1a1a1a; border-radius: 6px; padding: 32px; width: 420px; display: flex; flex-direction: column; gap: 16px; }
#lobby input { background: #0c0c0c; border: 1px solid #222; color: #ededed; padding: 10px 14px; font-family: inherit; font-size: 13px; border-radius: 4px; outline: none; }
#lobby input:focus { border-color: #444; }
#lobby input::placeholder { color: #333; }
#lobby button { background: #ededed; color: #0c0c0c; border: none; padding: 10px; font-family: inherit; font-size: 13px; font-weight: 600; border-radius: 4px; cursor: pointer; letter-spacing: .05em; }
#lobby button:hover { background: #fff; }
.label { font-size: 11px; color: #444; letter-spacing: .08em; text-transform: uppercase; margin-bottom: -8px; }
#invite-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 24px; }
#invite-screen .card { background: #111; border: 1px solid #1a1a1a; border-radius: 6px; padding: 32px; width: 420px; display: flex; flex-direction: column; gap: 16px; }
.invite-url { background: #0c0c0c; border: 1px solid #222; border-radius: 4px; padding: 12px 14px; font-size: 12px; color: #888; word-break: break-all; line-height: 1.6; }
.copy-btn { background: transparent; border: 1px solid #333; color: #ededed; padding: 10px; font-family: inherit; font-size: 12px; border-radius: 4px; cursor: pointer; letter-spacing: .05em; }
.copy-btn:hover { border-color: #555; }
.copy-btn.copied { border-color: #2a2; color: #4f4; }
.room-label { font-size: 11px; color: #444; letter-spacing: .08em; text-transform: uppercase; }
.room-name { font-size: 18px; color: #ededed; letter-spacing: .08em; }
.enter-btn { background: #ededed; color: #0c0c0c; border: none; padding: 10px; font-family: inherit; font-size: 13px; font-weight: 600; border-radius: 4px; cursor: pointer; }
#join-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 24px; }
#join-screen .card { background: #111; border: 1px solid #1a1a1a; border-radius: 6px; padding: 32px; width: 420px; display: flex; flex-direction: column; gap: 16px; }
#join-screen input { background: #0c0c0c; border: 1px solid #222; color: #ededed; padding: 10px 14px; font-family: inherit; font-size: 13px; border-radius: 4px; outline: none; }
#join-screen input:focus { border-color: #444; }
#join-screen input::placeholder { color: #333; }
#join-screen button { background: #ededed; color: #0c0c0c; border: none; padding: 10px; font-family: inherit; font-size: 13px; font-weight: 600; border-radius: 4px; cursor: pointer; }
#chat-screen { display: none; flex-direction: column; height: 100vh; }
#chat-header { display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid #111; gap: 12px; }
#chat-header .logo { font-size: 13px; font-weight: 600; letter-spacing: .1em; color: #ededed; }
#chat-header .room-id { color: #444; font-size: 13px; }
#chat-header .handle { margin-left: auto; color: #555; font-size: 12px; }
#invite-btn { background: transparent; border: 1px solid #222; color: #888; padding: 6px 12px; font-family: inherit; font-size: 11px; border-radius: 3px; cursor: pointer; letter-spacing: .05em; }
#invite-btn:hover { border-color: #444; color: #ededed; }
#invite-btn.copied { border-color: #2a2; color: #4f4; }
#leave-btn { background: transparent; border: 1px solid #222; color: #555; padding: 6px 12px; font-family: inherit; font-size: 11px; border-radius: 3px; cursor: pointer; }
#leave-btn:hover { border-color: #f44; color: #f44; }
#messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
.msg { display: flex; flex-direction: column; gap: 4px; }
.msg-meta { font-size: 11px; color: #444; }
.msg-meta .handle { color: #888; margin-right: 8px; }
.msg-text { font-size: 13px; color: #d0d0d0; line-height: 1.5; }
.msg-text.own { color: #ededed; }
.system-msg { font-size: 11px; color: #333; text-align: center; padding: 4px 0; }
#input-area { display: flex; border-top: 1px solid #111; }
#msg-input { flex: 1; background: #0c0c0c; border: none; color: #ededed; padding: 16px 20px; font-family: inherit; font-size: 13px; outline: none; }
#msg-input::placeholder { color: #333; }
#send-btn { background: transparent; border: none; border-left: 1px solid #111; color: #555; padding: 16px 20px; font-family: inherit; font-size: 12px; cursor: pointer; letter-spacing: .05em; }
#send-btn:hover { color: #ededed; }
</style>
</head>
<body>

<div id="lobby">
  <h1>PARAMANT</h1>
  <div class="card">
    <div class="label">API Key</div>
    <input id="api-key-input" type="password" placeholder="pgp_..." autocomplete="off">
    <div class="label">Jouw naam</div>
    <input id="handle-input" type="text" placeholder="naam" maxlength="24" autocomplete="off">
    <button onclick="createRoom()">Maak beveiligde room aan →</button>
  </div>
</div>

<div id="invite-screen">
  <div class="card">
    <div class="room-label">Room aangemaakt</div>
    <div class="room-name" id="display-room-name"></div>
    <div style="font-size:12px;color:#444;line-height:1.6">Deel deze link. Geen API key nodig om te joinen. Room verdwijnt na 30 minuten inactiviteit.</div>
    <div class="invite-url" id="invite-url-display"></div>
    <button class="copy-btn" id="copy-btn" onclick="copyLink()">⎘ Kopieer invite link</button>
    <button class="enter-btn" onclick="enterChat()">Ga naar chat →</button>
  </div>
</div>

<div id="join-screen">
  <h1 style="font-size:13px;letter-spacing:.15em;color:#555;text-transform:uppercase;">PARAMANT</h1>
  <div class="card">
    <div class="label">Je bent uitgenodigd voor room</div>
    <div class="room-name" id="join-room-display"></div>
    <div style="font-size:12px;color:#444;line-height:1.6">Kies een naam om anoniem te chatten. Geen account nodig.</div>
    <div class="label">Jouw naam</div>
    <input id="join-handle" type="text" placeholder="naam" maxlength="24" autocomplete="off">
    <button onclick="joinRoom()">Join chat →</button>
  </div>
</div>

<div id="chat-screen">
  <div id="chat-header">
    <span class="logo">PARAMANT</span>
    <span class="room-id"># <span id="header-room"></span></span>
    <span class="handle" id="header-handle"></span>
    <button id="invite-btn" onclick="copyInviteFromChat()">⎘ Invite</button>
    <button id="leave-btn" onclick="leaveChat()">Leave</button>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button id="send-btn" onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const RELAY = 'wss://chat.paramant.app';
let ws, currentRoom, currentHandle, currentApiKey, isOwner = false;

function generateRoomId() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    const arr = new Uint8Array(12);
    crypto.getRandomValues(arr);
    return Array.from(arr, b => chars[b % chars.length]).join('');
}

function show(id) {
    ['lobby','invite-screen','join-screen','chat-screen'].forEach(s => {
        const el = document.getElementById(s);
        if (el) el.style.display = 'none';
    });
    const el = document.getElementById(id);
    if (el) el.style.display = 'flex';
}

window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const roomParam = params.get('room');
    if (roomParam) {
        currentRoom = roomParam;
        document.getElementById('join-room-display').textContent = roomParam;
        show('join-screen');
    }
});

function createRoom() {
    const key = document.getElementById('api-key-input').value.trim();
    const handle = document.getElementById('handle-input').value.trim();
    if (!key || !handle) { alert('Vul API key en naam in'); return; }
    currentApiKey = key;
    currentHandle = handle;
    currentRoom = generateRoomId();
    isOwner = true;
    const inviteUrl = window.location.origin + '/chat?room=' + currentRoom;
    document.getElementById('display-room-name').textContent = currentRoom;
    document.getElementById('invite-url-display').textContent = inviteUrl;
    show('invite-screen');
}

function copyLink() {
    navigator.clipboard.writeText(window.location.origin + '/chat?room=' + currentRoom).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = '✓ Gekopieerd';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '⎘ Kopieer invite link'; btn.classList.remove('copied'); }, 2000);
    });
}

function enterChat() { connectWS(); }

function joinRoom() {
    const handle = document.getElementById('join-handle').value.trim();
    if (!handle) { alert('Kies een naam'); return; }
    currentHandle = handle;
    currentApiKey = null;
    isOwner = false;
    connectWS();
}

function connectWS() {
    document.getElementById('header-room').textContent = currentRoom;
    document.getElementById('header-handle').textContent = currentHandle;
    show('chat-screen');

    ws = new WebSocket(RELAY);
    ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'join', chatHash: currentRoom, nick: currentHandle }));
    };
    ws.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.type === 'packet') {
            const p = msg.payload || {};
            if (p.pType === 'chat') appendMsg(msg.nick, p.text, msg.nick === currentHandle);
        } else if (msg.type === 'peer_joined') {
            appendSystem(msg.nick + ' heeft de chat betreden');
        } else if (msg.type === 'peer_left') {
            appendSystem(msg.nick + ' heeft de chat verlaten');
        } else if (msg.type === 'flush') {
            appendSystem('— berichten gewist —');
        }
    };
    ws.onclose = () => appendSystem('Verbinding verbroken');
    ws.onerror = () => appendSystem('Verbindingsfout');
}

function appendMsg(handle, text, own) {
    if (!text) return;
    const el = document.createElement('div');
    el.className = 'msg';
    const time = new Date().toTimeString().slice(0,5);
    const h = String(handle).replace(/</g,'&lt;');
    const t = String(text).replace(/</g,'&lt;');
    el.innerHTML = '<div class="msg-meta"><span class="handle">' + h + '</span>' + time + '</div>'
                 + '<div class="msg-text' + (own ? ' own' : '') + '">' + t + '</div>';
    const msgs = document.getElementById('messages');
    msgs.appendChild(el);
    msgs.scrollTop = 999999;
}

function appendSystem(text) {
    const el = document.createElement('div');
    el.className = 'system-msg';
    el.textContent = text;
    const msgs = document.getElementById('messages');
    msgs.appendChild(el);
    msgs.scrollTop = 999999;
}

let msgSeq = 0;
function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type: 'packet', chatHash: currentRoom, seq: ++msgSeq, payload: { pType: 'chat', text } }));
    input.value = '';
}

function copyInviteFromChat() {
    navigator.clipboard.writeText(window.location.origin + '/chat?room=' + currentRoom).then(() => {
        const btn = document.getElementById('invite-btn');
        btn.textContent = '✓ Gekopieerd';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '⎘ Invite'; btn.classList.remove('copied'); }, 2000);
    });
}

function leaveChat() {
    if (ws) ws.close();
    window.location.href = '/chat';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('join-screen').style.display !== 'none') joinRoom();
});
</script>
</body>
</html>
