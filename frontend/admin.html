<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARAMANT</title>
<link rel="stylesheet" href="/design-system.css?v=4">
<link rel="stylesheet" href="/nav.css?v=4">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bone);color:var(--ink);font-family:var(--mono);font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}
input,select,button,textarea{font-family:var(--mono);font-size:13px}
a{color:var(--ink-dim);text-decoration:none}a:hover{color:var(--cobalt)}
</style>
</head>
<body>

<div class="meta-bar">
  <span><b>build</b> 2.4.5</span>
  <span class="sep">·</span>
  <span><b>keyex</b> ml-kem-768</span>
  <span class="sep">·</span>
  <span><b>fips</b> 203/204</span>
  <span class="right">STH —</span>
</div>

<div id="root"></div>
<script>
const RELAYS=[
  {l:"Health",u:"/rp/health"},
  {l:"Finance",u:"/rp/finance"},
  {l:"Legal",u:"/rp/legal"},
  {l:"IoT",u:"/rp/iot"},
  {l:"Fly.io",u:"/rp/fly"}
];
const V={bg:"#F8FAFC",sur:"#EEF2F6",b:"rgba(11,58,106,.15)",t:"#0B3A6A",m:"rgba(11,58,106,.65)",q:"rgba(11,58,106,.65)",g:"#B2FF3F",r:"#8c3a3a",y:"#8c7a2d",
  font:"-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif",
  mono:"'SF Mono','Fira Code','Cascadia Code',monospace"};

let adminKey="",relayData={},keys=[],logs=[],selectedRelay=RELAYS[0];

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#x27;").replace(/"/g,"&quot;")}
function ts(){return new Date().toLocaleTimeString()}
function addLog(msg,level="info"){
  const col={info:V.q,ok:V.g,error:V.r,warn:V.y}[level]||V.q;
  const sym={info:"·",ok:"✓",error:"✗",warn:"⚠"}[level]||"·";
  logs.unshift({ts:ts(),msg,col,sym});
  if(logs.length>100)logs.pop();
  renderLogs();
}

async function apiCall(relay,path,method="GET",body=null){
  try{
    const opts={method,headers:{"X-Api-Key":adminKey,"X-Admin-Token":adminKey,"Content-Type":"application/json","User-Agent":"paramant-admin/1.0"}};
    if(body)opts.body=JSON.stringify(body);
    const r=await fetch(relay+path,{...opts,signal:AbortSignal.timeout(8000)});
    return{ok:r.ok,status:r.status,data:await r.json().catch(()=>null)};
  }catch(e){return{ok:false,error:e.message}}
}

async function loadRelayData(relay){
  addLog("Loading "+relay.l+"...","info");
  const [health,audit,ct]=await Promise.all([
    fetch(relay.u+"/health",{signal:AbortSignal.timeout(5000)}).then(r=>r.json()).then(d=>({ok:true,data:d})).catch(()=>({ok:false,data:null})),
    apiCall(relay.u,"/v2/audit"),
    apiCall(relay.u,"/v2/ct/log?limit=10"),
  ]);
  relayData[relay.u]={health:health.data,audit:audit.data,ct:ct.data};
  const dot=document.getElementById("dot-"+relay.l.toLowerCase());
  if(dot)dot.style.background=health.ok?"#B2FF3F":"#8c3a3a";
  if(health.ok)addLog(relay.l+": v"+health.data?.version+" | uptime "+Math.floor((health.data?.uptime_s||0)/3600)+"h","ok");
  else addLog(relay.l+": unreachable","error");
  renderMain();
}

async function loadAllRelays(){
  addLog("Loading all relays...","info");
  await Promise.all(RELAYS.map(r=>loadRelayData(r)));
}

async function createKey(label,plan,email){
  if(!label){addLog("Label required","error");return}
  addLog("Creating key: "+label+" ("+plan+")...","info");
  const r=await apiCall(selectedRelay.u,"/v2/admin/keys","POST",{label,plan,email});
  if(r.ok&&r.data?.key){
    const fullKey=r.data.key;
    addLog("Key created: "+fullKey,"ok");
    showKeyOverlay(fullKey,label,plan,email);
    if(email){
      const mailR=await apiCall(selectedRelay.u,"/v2/admin/send-welcome","POST",{key:fullKey,label,plan,email});
      addLog(mailR.ok?"Welcome mail sent to "+email:"Mail failed: "+(mailR.data?.error||mailR.error),mailR.ok?"ok":"warn");
    }
    await loadKeys();
  }else{
    addLog("Key creation failed: "+(r.data?.error||r.error),"error");
  }
}

function showKeyOverlay(key,label,plan,email){
  const o=document.createElement("div");
  o.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px";
  o.innerHTML=
    '<div style="background:'+V.sur+';border:1px solid '+V.b+';border-radius:8px;padding:32px;max-width:520px;width:100%">'+
    '<div style="font-size:11px;font-family:'+V.mono+';color:'+V.g+';letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px">Key created</div>'+
    '<div style="font-size:11px;font-family:'+V.mono+';color:'+V.q+';margin-bottom:12px">'+esc(label)+' · '+esc(plan)+'</div>'+
    '<div style="background:'+V.bg+';border:1px solid '+V.b+';border-radius:5px;padding:16px;margin-bottom:12px;font-family:'+V.mono+';font-size:13px;color:'+V.t+';word-break:break-all;user-select:all">'+esc(key)+'</div>'+
    '<div style="background:rgba(178,255,63,.12);border:1px solid #0B3A6A;border-radius:5px;padding:12px;margin-bottom:20px;font-size:12px;color:#0B3A6A">Save this key in a password manager. It is shown once and cannot be recovered.</div>'+
    (email?'<div style="font-size:12px;color:'+V.q+';margin-bottom:20px">Welcome email will be sent to '+esc(email)+'</div>':'')+
    '<button onclick="this.closest(\'[data-overlay]\').remove()" style="width:100%;background:'+V.t+';color:'+V.bg+';border:none;border-radius:5px;padding:10px;font-size:13px;font-weight:500;cursor:pointer">I have saved this key</button>'+
    '</div>';
  o.dataset.overlay="1";
  o.addEventListener("click",e=>{if(e.target===o)o.remove();});
  document.body.appendChild(o);
}

async function resendMail(key,label,plan,email){
  if(!email){email=prompt("Email address for "+label+":");if(!email)return;}
  addLog("Sending welcome mail to "+email+"...","info");
  const r=await apiCall(selectedRelay.u,"/v2/admin/send-welcome","POST",{key,label,plan,email});
  if(r.ok&&r.data?.ok){
    addLog("Mail sent to "+email,"ok");
  }else{
    addLog("Mail failed: "+(r.data?.error||r.error||"unknown"),"error");
    showKeyOverlay(key,label,plan,email);
  }
}

async function revokeKey(key){
  if(!confirm("Revoke "+key.slice(0,20)+"...?"))return;
  addLog("Revoking "+key.slice(0,16)+"... on all sectors","warn");
  const localRelays=RELAYS.filter(r=>!r.u.includes("fly"));
  const results=await Promise.all(localRelays.map(r=>apiCall(r.u,"/v2/admin/keys/revoke","POST",{key})));
  const ok=results.filter(r=>r.ok).length;
  const failed=results.length-ok;
  if(ok>0){
    addLog("Key revoked on "+ok+"/"+localRelays.length+" sectors"+(failed?" ("+failed+" failed":"")+(failed?")":""),"ok");
    await loadKeys();
  }else{
    addLog("Revoke failed: "+(results[0]?.data?.error||results[0]?.error),"error");
  }
}

async function loadKeys(){
  addLog("Loading API keys...","info");
  const r=await apiCall(selectedRelay.u,"/v2/admin/keys");
  if(r.ok&&r.data?.keys){
    keys=r.data.keys;
    addLog(keys.length+" keys loaded","ok");
    renderKeys();
  }else{
    addLog("Keys endpoint not available — showing local state","warn");
  }
}

async function reloadUsers(){
  addLog("Reloading users on all relays...","info");
  for(const relay of RELAYS){
    const r=await apiCall(relay.u,"/v2/reload-users","POST",{});
    addLog(relay.l+": "+(r.ok?"reloaded ✓":"failed ✗")+(r.data?.count?" ("+r.data.count+" keys)":""),r.ok?"ok":"error");
  }
}

function renderLogs(){
  const el=document.getElementById("log-list");
  if(!el)return;
  el.innerHTML=logs.slice(0,30).map(l=>
    '<div style="display:flex;gap:12px;padding:3px 0;border-bottom:1px solid '+V.b+';font-size:11px;font-family:'+V.mono+'">'+
    '<span style="color:'+V.q+';flex-shrink:0">'+l.ts+'</span>'+
    '<span style="color:'+l.col+';flex-shrink:0">'+l.sym+'</span>'+
    '<span style="color:'+V.m+'">'+esc(l.msg)+'</span></div>'
  ).join("");
}

function renderKeys(){
  const el=document.getElementById("keys-list");
  if(!el)return;
  if(!keys.length){el.innerHTML='<div style="padding:24px;text-align:center;color:'+V.q+';font-size:12px">No keys loaded</div>';return}
  el.innerHTML='<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>'+
    ["Label","Plan","Key","Status","Actions"].map(h=>'<th style="text-align:left;padding:8px 12px;font-size:10px;font-family:'+V.mono+';color:'+V.q+';letter-spacing:.06em;border-bottom:1px solid '+V.b+';text-transform:uppercase">'+h+'</th>').join("")+
    '</tr></thead><tbody>'+
    keys.map((k,i)=>'<tr style="background:'+(i%2===0?V.bg:V.sur)+'">'+
      '<td style="padding:8px 12px;color:'+V.m+'">'+esc(k.label||"—")+'</td>'+
      '<td style="padding:8px 12px;font-family:'+V.mono+';color:'+V.q+'">'+esc(k.plan||"—")+'</td>'+
      '<td style="padding:8px 12px;font-family:'+V.mono+';color:'+V.q+';font-size:11px;cursor:pointer" data-action="view" data-key="'+esc(k.key||'')+'" data-label="'+esc(k.label||'')+'" data-plan="'+esc(k.plan||'')+'" data-email="'+esc(k.email||'')+'" title="Click to view full key">'+esc((k.key||"").slice(0,24))+'...</td>'+
      '<td style="padding:8px 12px"><span style="color:'+(k.active!==false?V.g:V.r)+'">'+(k.active!==false?"active":"revoked")+'</span></td>'+
      '<td style="padding:8px 12px;white-space:nowrap">'+
        (k.email?'<button data-action="mail" data-key="'+esc(k.key||'')+'" data-label="'+esc(k.label||'')+'" data-plan="'+esc(k.plan||'')+'" data-email="'+esc(k.email||'')+'" style="background:none;border:1px solid '+V.b+';color:'+V.m+';border-radius:3px;padding:3px 8px;font-size:11px;cursor:pointer;margin-right:4px">Mail</button>':'')+
        '<button data-action="revoke" data-key="'+esc(k.key||'')+'" style="background:none;border:1px solid '+V.b+';color:'+V.q+';border-radius:3px;padding:3px 8px;font-size:11px;cursor:pointer">Revoke</button>'+
      '</td>'+
    '</tr>').join("")+
    '</tbody></table>';
  el.onclick=function(e){
    const t=e.target.closest("[data-action]");
    if(!t)return;
    const{action,key,label,plan,email}=t.dataset;
    if(action==="view")showKeyOverlay(key,label,plan,email);
    else if(action==="mail")resendMail(key,label,plan,email);
    else if(action==="revoke")revokeKey(key);
  };
}

function renderMain(){
  const rdata=relayData[selectedRelay.u]||{};
  const h=rdata.health||{};
  const st=h.stats||{};
  const el=document.getElementById("relay-panel");
  if(!el)return;
  const cards=[
    ["Version",h.version||"—",V.t],
    ["Uptime",h.uptime_s?Math.floor(h.uptime_s/3600)+"h":"—",V.t],
    ["Blobs in flight",h.blobs||0,V.y],
    ["Pubkeys",h.pubkeys||0,V.t],
    ["Sent",st.inbound||0,V.t],
    ["Burned",st.burned||0,V.t],
    ["Webhooks",st.webhooks_sent||0,V.t],
    ["ML-DSA",h.signatures?.includes("ML-DSA")?"active":"—",V.g],
  ];
  el.innerHTML=
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px">'+
    cards.map(([l,v,c])=>'<div style="background:'+V.sur+';border:1px solid '+V.b+';border-radius:5px;padding:14px">'+
      '<div style="font-size:10px;font-family:'+V.mono+';color:'+V.q+';letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">'+l+'</div>'+
      '<div style="font-size:22px;font-weight:600;color:'+c+'">'+v+'</div></div>').join("")+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
    '<div style="background:'+V.sur+';border:1px solid '+V.b+';border-radius:5px;overflow:hidden">'+
    '<div style="padding:10px 14px;border-bottom:1px solid '+V.b+';font-size:11px;font-family:'+V.mono+';color:'+V.q+';text-transform:uppercase;letter-spacing:.04em">Audit log</div>'+
    '<div style="padding:12px 14px;max-height:200px;overflow-y:auto">'+
    ((rdata.audit?.entries||[]).slice(0,20).map(e=>
      '<div style="display:flex;gap:10px;font-size:11px;font-family:'+V.mono+';padding:3px 0;border-bottom:1px solid '+V.b+'">'+
      '<span style="color:'+V.q+';flex-shrink:0">'+(e.ts||"").slice(11,19)+'</span>'+
      '<span style="color:'+(e.event?.includes("ack")?V.g:e.event?.includes("inbound")?"#4a6a9c":V.m)+'">'+esc(e.event||"")+'</span>'+
      '<span style="color:'+V.q+'">'+(e.hash||"").slice(0,12)+'</span></div>'
    ).join("")||'<div style="color:'+V.q+';font-size:12px">No audit entries</div>')+
    '</div></div>'+
    '<div style="background:'+V.sur+';border:1px solid '+V.b+';border-radius:5px;overflow:hidden">'+
    '<div style="padding:10px 14px;border-bottom:1px solid '+V.b+';font-size:11px;font-family:'+V.mono+';color:'+V.q+';text-transform:uppercase;letter-spacing:.04em">CT log</div>'+
    '<div style="padding:12px 14px;max-height:200px;overflow-y:auto">'+
    '<div style="font-size:11px;font-family:'+V.mono+';color:'+V.q+';margin-bottom:8px">Size: '+(rdata.ct?.size||0)+' | Root: '+(rdata.ct?.root||"").slice(0,16)+'...</div>'+
    ((rdata.ct?.entries||[]).slice(0,5).map(e=>
      '<div style="display:flex;gap:10px;font-size:11px;font-family:'+V.mono+';padding:3px 0;border-bottom:1px solid '+V.b+'">'+
      '<span style="color:'+V.q+'">#'+e.index+'</span>'+
      '<span style="color:'+V.m+'">'+(e.leaf_hash||"").slice(0,20)+'...</span>'+
      '<span style="color:'+V.q+'">'+(e.ts||"").slice(0,10)+'</span></div>'
    ).join("")||'<div style="color:'+V.q+';font-size:12px">No CT entries</div>')+
    '</div></div></div>';
}

function render(){
  if(!adminKey){
    document.getElementById("root").innerHTML=
      '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px">'+
      '<div style="width:100%;max-width:360px">'+
      '<div style="font-family:'+V.mono+';font-size:13px;color:'+V.q+';margin-bottom:8px">PARAMANT / admin</div>'+
      '<h2 style="font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:8px">Admin panel</h2>'+
      '<p style="font-size:13px;color:'+V.m+';margin-bottom:32px;line-height:1.6">Two-factor authentication required.</p>'+
      '<label style="display:block;font-size:11px;font-family:'+V.mono+';color:'+V.q+';letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Admin API key</label>'+
      '<input id="ki" placeholder="pgp_..." style="width:100%;background:'+V.sur+';border:1px solid '+V.b+';border-radius:5px;padding:10px 14px;color:'+V.t+';font-size:13px;outline:none;margin-bottom:16px;font-family:'+V.mono+'">'+
      '<label style="display:block;font-size:11px;font-family:'+V.mono+';color:'+V.q+';letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">TOTP code <span style="font-weight:400">(Authenticator app)</span></label>'+
      '<input id="totp" placeholder="000000" maxlength="6" autocomplete="one-time-code" style="width:100%;background:'+V.sur+';border:1px solid '+V.b+';border-radius:5px;padding:10px 14px;color:'+V.t+';font-size:22px;outline:none;margin-bottom:24px;font-family:'+V.mono+';letter-spacing:.3em" oninput="this.value=this.value.replace(/[^0-9]/g,\'\')">'+
      '<button onclick="doLogin()" style="width:100%;background:'+V.t+';color:'+V.bg+';border:none;border-radius:5px;padding:11px;font-size:13px;font-weight:500;cursor:pointer">Sign in</button>'+
      '<p style="font-size:11px;color:'+V.q+';margin-top:16px;text-align:center">MFA required. Open Authenticator app for code.</p>'+
      '</div></div>';
    document.getElementById("ki").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("totp").focus()});
    document.getElementById("totp").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
    return;
  }

  document.getElementById("root").innerHTML=
  '<nav style="display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:1px solid '+V.b+';position:sticky;top:0;background:rgba(12,12,12,.95);z-index:100">'+
  '<div style="display:flex;align-items:center;gap:20px">'+
  '<span style="font-family:'+V.mono+';font-size:13px;font-weight:500;letter-spacing:.08em;color:'+V.t+'">PARAMANT</span>'+
  '<span style="font-size:12px;color:'+V.q+';font-family:'+V.mono+'">/ r34ct0r</span></div>'+
  '<div style="display:flex;align-items:center;gap:12px">'+
  '<select onchange="selectedRelay=RELAYS.find(r=>r.u===this.value)||RELAYS[0];loadRelayData(selectedRelay)" style="background:'+V.sur+';border:1px solid '+V.b+';border-radius:4px;padding:5px 10px;color:'+V.t+';font-size:12px;font-family:'+V.mono+'">'+
  RELAYS.map(r=>'<option value="'+r.u+'">'+r.l+'</option>').join("")+
  '</select>'+
  '<button onclick="loadAllRelays()" style="background:none;border:1px solid '+V.b+';color:'+V.m+';border-radius:4px;padding:5px 12px;font-size:11px;cursor:pointer">Refresh all</button>'+
  '<button onclick="reloadUsers()" style="background:none;border:1px solid '+V.b+';color:'+V.m+';border-radius:4px;padding:5px 12px;font-size:11px;cursor:pointer">Reload users</button>'+
  '<button onclick="adminKey=\'\';render()" style="background:none;border:1px solid '+V.b+';color:'+V.q+';border-radius:4px;padding:5px 12px;font-size:11px;cursor:pointer">Sign out</button>'+
  '</div></nav>'+

  '<div style="max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 340px;gap:20px">'+
  '<div>'+
  '<div style="background:'+V.sur+';border:1px solid '+V.b+';border-radius:6px;overflow:hidden;margin-bottom:16px">'+
  '<div style="padding:12px 16px;border-bottom:1px solid '+V.b+';display:flex;align-items:center;justify-content:space-between">'+
  '<span style="font-size:11px;font-family:'+V.mono+';color:'+V.q+';letter-spacing:.04em;text-transform:uppercase">Relay monitor — '+selectedRelay.l+'</span>'+
  '<button onclick="loadRelayData(selectedRelay)" style="background:none;border:1px solid '+V.b+';color:'+V.q+';border-radius:3px;padding:3px 8px;font-size:11px;cursor:pointer">Refresh</button></div>'+
  '<div style="padding:16px" id="relay-panel"><div style="color:'+V.q+';font-size:12px;font-family:'+V.mono+'">Loading...</div></div></div>'+

  '<div style="background:'+V.sur+';border:1px solid '+V.b+';border-radius:6px;overflow:hidden;margin-bottom:16px">'+
  '<div style="padding:12px 16px;border-bottom:1px solid '+V.b+';display:flex;align-items:center;justify-content:space-between">'+
  '<span style="font-size:11px;font-family:'+V.mono+';color:'+V.q+';letter-spacing:.04em;text-transform:uppercase">API keys</span>'+
  '<div style="display:flex;gap:8px">'+
  '<button onclick="loadKeys()" style="background:none;border:1px solid '+V.b+';color:'+V.m+';border-radius:3px;padding:3px 8px;font-size:11px;cursor:pointer">Load keys</button>'+
  '<button onclick="document.getElementById(\'new-key-form\').style.display=document.getElementById(\'new-key-form\').style.display===\'none\'?\'block\':\'none\'" style="background:'+V.t+';color:'+V.bg+';border:none;border-radius:3px;padding:3px 10px;font-size:11px;cursor:pointer;font-weight:500">+ New key</button>'+
  '</div></div>'+
  '<div id="new-key-form" style="display:none;padding:16px;border-bottom:1px solid '+V.b+';background:'+V.bg+'">'+
  '<div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end">'+
  '<div><label style="display:block;font-size:10px;font-family:'+V.mono+';color:'+V.q+';letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">Label</label>'+
  '<input id="nk-label" placeholder="acme-corp" style="width:100%;background:'+V.sur+';border:1px solid '+V.b+';border-radius:4px;padding:8px 10px;color:'+V.t+';font-size:12px;outline:none"></div>'+
  '<div><label style="display:block;font-size:10px;font-family:'+V.mono+';color:'+V.q+';letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">Plan</label>'+
  '<select id="nk-plan" style="width:100%;background:'+V.sur+';border:1px solid '+V.b+';border-radius:4px;padding:8px 10px;color:'+V.t+';font-size:12px">'+
  '<option value="dev">dev — €9.99</option><option value="chat">chat — €29</option>'+
  '<option value="pro" selected>pro — €49.99</option><option value="enterprise">enterprise — €499.99</option>'+
  '</select></div>'+

async function doLogin(){
  const k=document.getElementById("ki").value.trim();
  const totp=document.getElementById("totp").value.trim();
  if(!k.startsWith("pgp_")){addLog("Invalid key format","error");return}
  if(totp.length!==6){addLog("TOTP must be 6 digits","error");return}
  addLog("Validating credentials...","info");
  const mfa=await fetch("/rp/health/v2/admin/verify-mfa",{
    method:"POST",
    headers:{"Content-Type":"application/json","X-Api-Key":k,"X-Admin-Token":k},
    body:JSON.stringify({totp_code:totp}),
    signal:AbortSignal.timeout(5000)
  });
  const md=await mfa.json().catch(()=>({}));
  if(!md.ok){addLog("Invalid credentials — check key and TOTP","error");return}
  adminKey=k;
  addLog("Signed in | MFA verified","ok");
  render();
  loadAllRelays();
  loadKeys();
}

render();
