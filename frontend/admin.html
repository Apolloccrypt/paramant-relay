<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARAMANT · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F8FAFC;color:#0B3A6A;font-family:'Inter',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}
button,input,select{font-family:inherit;font-size:inherit}
/* Login */
.lw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.lb{width:100%;max-width:340px}
.l-brand{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#475569;margin-bottom:20px}
.l-title{font-size:22px;font-weight:600;color:#0B3A6A;margin-bottom:6px}
.l-sub{font-size:13px;color:#475569;margin-bottom:26px;line-height:1.5}
.l-lbl{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#475569;margin-bottom:6px}
.l-inp{width:100%;background:#fff;border:1.5px solid rgba(11,58,106,.15);padding:10px 12px;color:#0B3A6A;font-size:13px;outline:none;margin-bottom:12px;font-family:'IBM Plex Mono',monospace;transition:border-color .15s}
.l-inp:focus{border-color:#1D4ED8}
.l-totp{font-size:20px;letter-spacing:.2em;margin-bottom:18px}
.l-btn{width:100%;background:#0B3A6A;color:#F8FAFC;border:none;padding:11px;font-size:12px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;transition:background .15s}
.l-btn:hover{background:#1D4ED8}
.l-btn:disabled{opacity:.5;cursor:default}
.l-err{font-size:12px;color:#dc2626;margin-top:10px;font-family:'IBM Plex Mono',monospace;display:none}
.l-note{font-size:11px;color:#94a3b8;margin-top:12px;text-align:center;font-family:'IBM Plex Mono',monospace}
/* Shell */
.shell{display:none;flex-direction:column;min-height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:1.5px solid rgba(11,58,106,.08);background:#F8FAFC;position:sticky;top:0;z-index:50}
.hdr-brand{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;font-weight:700;color:#0B3A6A;text-transform:uppercase;white-space:nowrap}
.tabs{display:flex;gap:0;overflow-x:auto}
.tabs button{background:transparent;border:none;border-bottom:2px solid transparent;padding:16px 16px 14px;font-family:'Inter',sans-serif;font-size:13px;color:#475569;cursor:pointer;white-space:nowrap;transition:color .15s}
.tabs button.on{color:#0B3A6A;border-bottom-color:#1D4ED8;font-weight:600}
.tabs button:hover:not(.on){color:#0B3A6A}
.hdr-meta{display:flex;gap:10px;align-items:center;flex-shrink:0}
.lic{background:rgba(178,255,63,.22);color:#0B3A6A;padding:4px 10px;font-size:11px;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.lo-btn{padding:6px 12px;background:transparent;border:1.5px solid rgba(11,58,106,.2);color:#0B3A6A;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;transition:border-color .15s}
.lo-btn:hover{border-color:#0B3A6A}
.main{flex:1;padding:24px;max-width:1400px;width:100%;margin:0 auto}
.panel{display:none}.panel.on{display:block}
/* Stat cards */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.sc{background:#fff;border:1px solid rgba(11,58,106,.08);padding:20px}
.sc-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#475569;margin-bottom:10px}
.sc-val{font-size:30px;font-weight:500;color:#0B3A6A;font-family:'IBM Plex Mono',monospace;line-height:1}
/* Cards */
.card{background:#fff;border:1px solid rgba(11,58,106,.08);padding:20px;margin-bottom:16px}
.card-hdr{font-size:12px;font-weight:600;color:#0B3A6A;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase}
.card-hdr small{font-size:11px;font-weight:400;color:#475569;text-transform:none;letter-spacing:0;font-family:'Inter',sans-serif}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:16px}
/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 12px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#475569;border-bottom:1.5px solid rgba(11,58,106,.08)}
.tbl td{padding:11px 12px;border-bottom:1px solid rgba(11,58,106,.04);color:#0B3A6A}
.tbl tr:hover td{background:rgba(29,78,216,.02)}
.mono{font-family:'IBM Plex Mono',monospace;font-size:12px}
/* Badges */
.badge{display:inline-block;padding:2px 8px;font-size:11px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
.badge.community{background:rgba(11,58,106,.08);color:#0B3A6A}
.badge.pro{background:rgba(29,78,216,.1);color:#1D4ED8}
.badge.enterprise{background:rgba(178,255,63,.35);color:#2d5a00;font-weight:700}
.badge.trial{background:rgba(245,158,11,.1);color:#b45309}
.chip{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.chip.active{color:#059669}.chip.pending{color:#d97706}.chip.none{color:#94a3b8}.chip.revoked{color:#dc2626}
/* Filter bar */
.fb{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fb input,.fb select{padding:7px 10px;border:1.5px solid rgba(11,58,106,.12);font-size:12px;font-family:'Inter',sans-serif;background:#fff;color:#0B3A6A;outline:none}
.fb input:focus,.fb select:focus{border-color:#1D4ED8}
.sp{flex:1}
.btn{padding:7px 14px;background:#0B3A6A;color:#F8FAFC;border:none;font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .15s}
.btn:hover{background:#1D4ED8}
.btn.out{background:transparent;border:1.5px solid rgba(11,58,106,.2);color:#0B3A6A}
.btn.out:hover{border-color:#1D4ED8;color:#1D4ED8;background:transparent}
/* Relay strip */
.rs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.ri{padding:10px 12px;background:rgba(5,150,105,.08);border-left:3px solid #059669;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#065f46}
.ri.offline{background:rgba(220,38,38,.06);border-left-color:#dc2626;color:#991b1b}
.ri.loading{background:rgba(11,58,106,.04);border-left-color:#94a3b8;color:#475569}
.ri-name{font-weight:700;margin-bottom:2px}
.ri-det{font-size:10px;opacity:.8}
/* Activity */
.al{font-family:'IBM Plex Mono',monospace;font-size:11px}
.ai{display:flex;gap:12px;padding:5px 0;border-bottom:1px solid rgba(11,58,106,.04)}
.ai .t{color:#475569;flex-shrink:0;width:80px}
.ai .e{color:#1D4ED8;flex-shrink:0;width:160px}
.ai .u{color:#0B3A6A;opacity:.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Plan bars */
.pb{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pb .pl{width:90px;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#475569}
.pb .tr{flex:1;height:6px;background:rgba(11,58,106,.06);overflow:hidden}
.pb .fi{height:100%;background:#1D4ED8;transition:width .5s}
.pb .cn{width:28px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#475569}
/* Action menu */
.amw{position:relative;display:inline-block}
.amb{background:transparent;border:1px solid rgba(11,58,106,.12);color:#0B3A6A;padding:4px 10px;font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer}
.amb:hover{background:rgba(11,58,106,.04)}
.am{display:none;position:absolute;right:0;top:calc(100% + 4px);background:#fff;border:1px solid rgba(11,58,106,.15);z-index:20;min-width:190px;box-shadow:0 4px 16px rgba(11,58,106,.1)}
.am.open{display:block}
.am button{display:block;width:100%;text-align:left;padding:9px 14px;background:transparent;border:none;font-size:13px;color:#0B3A6A;cursor:pointer}
.am button:hover{background:rgba(29,78,216,.05)}
.am button.danger{color:#dc2626}
.am button.danger:hover{background:rgba(220,38,38,.05)}
.am .sep{height:1px;background:rgba(11,58,106,.06);margin:4px 0}
/* Banner */
.banner{padding:10px 14px;margin-bottom:14px;font-size:13px;line-height:1.5}
.banner.stub{background:rgba(245,158,11,.08);border-left:3px solid #d97706;color:#92400e}
.banner.info{background:rgba(29,78,216,.06);border-left:3px solid #1D4ED8;color:#1e3a8a}
/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#0B3A6A;color:#F8FAFC;padding:10px 16px;font-size:12px;font-family:'IBM Plex Mono',monospace;z-index:999;max-width:320px}
.toast.err{background:#dc2626}
.toast.ok{background:#059669}
/* Loading */
.sp-icon{display:inline-block;width:14px;height:14px;border:2px solid rgba(11,58,106,.12);border-top-color:#1D4ED8;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:32px;text-align:center;color:#94a3b8;font-family:'IBM Plex Mono',monospace;font-size:12px}
/* Responsive */
@media(max-width:900px){.sg,.rs,.g2,.g3{grid-template-columns:1fr 1fr}.tabs{overflow-x:auto}}
@media(max-width:600px){.sg,.rs{grid-template-columns:1fr}.hdr{padding:0 12px}.main{padding:14px}.hdr-meta .lic{display:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="view-login" class="lw">
  <div class="lb">
    <div class="l-brand">PARAMANT · Infra</div>
    <h1 class="l-title">Admin panel</h1>
    <p class="l-sub">Two-factor authentication required to access the dashboard.</p>
    <label class="l-lbl">Admin token</label>
    <input id="l-token" type="password" class="l-inp" placeholder="Enter admin token" autocomplete="current-password">
    <label class="l-lbl">TOTP code <small style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">(Authenticator app)</small></label>
    <input id="l-totp" type="text" class="l-inp l-totp" placeholder="000000" maxlength="6" autocomplete="one-time-code" inputmode="numeric">
    <button id="l-btn" class="l-btn" onclick="doLogin()">Sign in</button>
    <div id="l-err" class="l-err"></div>
    <div class="l-note">Session expires after 1 hour</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="view-dashboard" class="shell">
  <header class="hdr">
    <div class="hdr-brand">PARAMANT · Admin</div>
    <nav class="tabs" id="nav-tabs">
      <button data-tab="overview" class="on" onclick="switchTab('overview')">Overview</button>
      <button data-tab="users" onclick="switchTab('users')">Users</button>
      <button data-tab="audit" onclick="switchTab('audit')">Audit</button>
      <button data-tab="billing" onclick="switchTab('billing')">Billing</button>
      <button data-tab="relay" onclick="switchTab('relay')">Relay</button>
    </nav>
    <div class="hdr-meta">
      <span class="lic">v2.4.5 · Licensed</span>
      <button class="lo-btn" onclick="doLogout()">Sign out</button>
    </div>
  </header>
  <main class="main">
    <div id="tab-overview" class="panel on"></div>
    <div id="tab-users" class="panel"></div>
    <div id="tab-audit" class="panel"></div>
    <div id="tab-billing" class="panel"></div>
    <div id="tab-relay" class="panel"></div>
  </main>
</div>

<script>
/* ── State ───────────────────────────────────────────────────────────────── */
let SESSION = sessionStorage.getItem('adm_session') || '';
let LOADED = {};
let REFRESH = {};
let openMenu = null;

/* ── Helpers ─────────────────────────────────────────────────────────────── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmt(ts){if(!ts)return '—';const d=new Date(ts);return d.toLocaleDateString('nl-NL',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}
function toast(msg,type=''){const el=document.createElement('div');el.className='toast'+(type?' '+type:'');el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3500)}
function showErr(msg){const e=document.getElementById('l-err');e.textContent=msg;e.style.display='block'}

async function api(path,opts={}){
  const r=await fetch('/admin/api'+path,{...opts,headers:{'X-Session':SESSION,'Content-Type':'application/json',...(opts.headers||{})}});
  const ct=r.headers.get('content-type')||'';
  const data=ct.includes('json')?await r.json().catch(()=>null):null;
  return{ok:r.ok,status:r.status,data};
}

/* ── Auth ────────────────────────────────────────────────────────────────── */
async function doLogin(){
  const token=document.getElementById('l-token').value.trim();
  const totp=document.getElementById('l-totp').value.replace(/\D/g,'');
  if(!token){showErr('Admin token required');return}
  if(totp.length!==6){showErr('TOTP must be 6 digits');return}
  const btn=document.getElementById('l-btn');
  btn.disabled=true;btn.textContent='Signing in…';
  document.getElementById('l-err').style.display='none';
  const r=await fetch('/admin/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,totp})});
  const d=await r.json().catch(()=>({}));
  if(!r.ok||!d.session){
    showErr(d.error||'Login failed — check token and TOTP');
    btn.disabled=false;btn.textContent='Sign in';return;
  }
  SESSION=d.session;
  sessionStorage.setItem('adm_session',SESSION);
  document.getElementById('view-login').style.display='none';
  document.getElementById('view-dashboard').style.display='flex';
  const hash=location.hash.replace('#','');
  switchTab(['overview','users','audit','billing','relay'].includes(hash)?hash:'overview');
}

async function doLogout(){
  await api('/auth/logout',{method:'POST'}).catch(()=>{});
  SESSION='';sessionStorage.removeItem('adm_session');
  LOADED={};Object.values(REFRESH).forEach(clearInterval);REFRESH={};
  document.getElementById('view-dashboard').style.display='none';
  document.getElementById('view-login').style.display='flex';
  document.getElementById('l-token').value='';
  document.getElementById('l-totp').value='';
}

/* ── Tab switching ───────────────────────────────────────────────────────── */
function switchTab(tab){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  document.getElementById('tab-'+tab).classList.add('on');
  location.hash='#'+tab;
  if(!LOADED[tab]){LOADED[tab]=true;loadTab(tab);}
}

function loadTab(tab){
  if(tab==='overview')loadOverview();
  else if(tab==='users')loadUsers();
  else if(tab==='audit')loadAudit();
  else if(tab==='billing')loadBilling();
  else if(tab==='relay')loadRelay();
}

/* ── Overview ────────────────────────────────────────────────────────────── */
async function loadOverview(){
  const el=document.getElementById('tab-overview');
  el.innerHTML='<div class="empty"><span class="sp-icon"></span>Loading…</div>';
  const r=await api('/admin/overview');
  if(!r.ok){el.innerHTML='<div class="empty">Error loading overview</div>';return}
  const d=r.data;
  const st=d.stats||{};
  const dist=d.plan_distribution||{};
  const total=Object.values(dist).reduce((a,b)=>a+b,0)||1;
  el.innerHTML=
    '<div class="sg">'+
      statCard('Signups today',st.signups_today??'—')+
      statCard('Active sessions',st.active_sessions??'—')+
      statCard('Pro upgrades today',st.pro_upgrades_today??'—')+
      statCard('MRR (EUR)','€'+((st.revenue_mrr||0)/100).toFixed(0))+
    '</div>'+
    (d.alerts&&d.alerts.length?'<div class="card"><div class="card-hdr">Alerts</div>'+d.alerts.map(a=>'<div class="banner info">'+esc(a)+'</div>').join('')+'</div>':'')+
    '<div class="g2">'+
      '<div class="card"><div class="card-hdr">Recent activity <small>last 10 events</small></div>'+
        '<div class="al">'+
          (d.recent_activity&&d.recent_activity.length?
            d.recent_activity.map(e=>'<div class="ai"><span class="t">'+fmt(e.ts).split(' ').slice(-1)[0]+'</span><span class="e">'+esc(e.event_type||'—')+'</span><span class="u">'+esc((e.user_id||'').slice(0,20))+'</span></div>').join(''):
            '<div class="empty">No events yet</div>')+
        '</div>'+
      '</div>'+
      '<div class="card"><div class="card-hdr">Plan distribution</div>'+
        planBars(dist,total)+
      '</div>'+
    '</div>';
  clearInterval(REFRESH.overview);
  REFRESH.overview=setInterval(()=>{LOADED.overview=false;loadOverview();},30000);
}

function statCard(lbl,val){return '<div class="sc"><div class="sc-lbl">'+lbl+'</div><div class="sc-val">'+esc(val)+'</div></div>'}

function planBars(dist,total){
  return ['community','pro','enterprise','trial'].map(p=>{
    const n=dist[p]||0;
    return '<div class="pb"><span class="pl">'+p+'</span><div class="tr"><div class="fi" style="width:'+(n/total*100).toFixed(1)+'%"></div></div><span class="cn">'+n+'</span></div>';
  }).join('');
}

/* ── Users ───────────────────────────────────────────────────────────────── */
let allUsers=[];
async function loadUsers(){
  const el=document.getElementById('tab-users');
  el.innerHTML='<div class="empty"><span class="sp-icon"></span>Loading users…</div>';
  const r=await api('/admin/users');
  if(!r.ok){el.innerHTML='<div class="empty">Error loading users</div>';return}
  allUsers=r.data.users||[];
  const counts=r.data.counts||{};
  renderUsers(el,allUsers,counts);
}

function renderUsers(el,users,counts){
  el.innerHTML=
    '<div class="card"><div class="card-hdr">Users <small>'+counts.total+' total · '+counts.active+' active</small>'+
      '<button class="btn" onclick="showNewKeyModal()">+ New key</button>'+
    '</div>'+
    '<div class="fb">'+
      '<input id="u-search" placeholder="Search email or label…" oninput="filterUsers()" style="width:220px">'+
      '<select id="u-plan" onchange="filterUsers()"><option value="">All plans</option><option>community</option><option>pro</option><option>enterprise</option><option>trial</option></select>'+
      '<select id="u-totp" onchange="filterUsers()"><option value="">Any TOTP</option><option value="active">Active</option><option value="pending">Pending</option><option value="none">None</option></select>'+
      '<select id="u-status" onchange="filterUsers()"><option value="">All status</option><option value="active">Active</option><option value="revoked">Revoked</option></select>'+
    '</div>'+
    '<div id="u-table-wrap">'+usersTable(users)+'</div>'+
    '</div>';
}

function filterUsers(){
  const q=(document.getElementById('u-search').value||'').toLowerCase();
  const plan=document.getElementById('u-plan').value;
  const totp=document.getElementById('u-totp').value;
  const status=document.getElementById('u-status').value;
  let filtered=allUsers;
  if(q)filtered=filtered.filter(u=>(u.email||'').toLowerCase().includes(q)||(u.label||'').toLowerCase().includes(q));
  if(plan)filtered=filtered.filter(u=>(u.plan||'community')===plan);
  if(totp)filtered=filtered.filter(u=>u.totp_status===totp);
  if(status==='active')filtered=filtered.filter(u=>u.active);
  else if(status==='revoked')filtered=filtered.filter(u=>!u.active);
  document.getElementById('u-table-wrap').innerHTML=usersTable(filtered);
}

function usersTable(users){
  if(!users.length)return '<div class="empty">No users match filters</div>';
  return '<table class="tbl"><thead><tr><th>Email / Label</th><th>Plan</th><th>TOTP</th><th>Status</th><th>Created</th><th></th></tr></thead><tbody>'+
    users.map((u,i)=>'<tr>'+
      '<td><div>'+esc(u.email||'—')+'</div>'+
        (u.label?'<div class="mono" style="font-size:11px;color:#475569">'+esc(u.label)+'</div>':'')+
      '</td>'+
      '<td><span class="badge '+esc(u.plan||'community')+'">'+esc(u.plan||'community')+'</span></td>'+
      '<td><span class="chip '+esc(u.totp_status)+'">'+esc(u.totp_status)+'</span></td>'+
      '<td><span class="chip '+(u.active?'active':'revoked')+'">'+(u.active?'active':'revoked')+'</span></td>'+
      '<td class="mono" style="font-size:11px;color:#475569">'+(u.created?u.created.split('T')[0]:'—')+'</td>'+
      '<td><div class="amw"><button class="amb" onclick="toggleMenu(event,\'menu-u-'+i+'\')">···</button>'+
        '<div class="am" id="menu-u-'+i+'" data-key="'+esc(u.key)+'" data-email="'+esc(u.email||'')+'" data-label="'+esc(u.label||'')+'" data-plan="'+esc(u.plan||'community')+'">'+
          '<button onclick="uAction(\"welcome\",this)">Resend welcome email</button>'+
          '<button onclick="uAction(\"setup\",this)">Send TOTP setup link</button>'+
          '<div class="sep"></div>'+
          '<button onclick="uAction(\"plan\",this)">Change plan</button>'+
          '<button onclick="uAction(\"reset-totp\",this)">Reset TOTP (send setup email)</button>'+
          '<div class="sep"></div>'+
          '<button onclick="uAction(\"revoke\",this)" class="danger">Revoke key</button>'+
        '</div>'+
      '</div></td>'+
    '</tr>').join('')+'</tbody></table>';
}

function toggleMenu(e,id){
  e.stopPropagation();
  const m=document.getElementById(id);
  const wasOpen=m.classList.contains('open');
  if(openMenu)openMenu.classList.remove('open');
  if(!wasOpen){m.classList.add('open');openMenu=m;}
  else openMenu=null;
}
document.addEventListener('click',()=>{if(openMenu){openMenu.classList.remove('open');openMenu=null;}});

async function uAction(action,btn){
  const m=btn.closest('.am');
  const key=m.dataset.key,email=m.dataset.email,label=m.dataset.label,plan=m.dataset.plan;
  m.classList.remove('open');openMenu=null;
  if(action==='welcome'){
    if(!email){toast('No email on record for this key','err');return}
    if(!confirm('Resend welcome email to '+email+'?'))return;
    const r=await api('/sectors/health/keys/welcome',{method:'POST',body:JSON.stringify({key,label,plan,email})});
    toast(r.ok?'Welcome email sent to '+email:'Failed: '+(r.data?.error||'unknown'),r.ok?'ok':'err');
  }else if(action==='setup'){
    if(!email){toast('No email on record','err');return}
    if(!confirm('Send new TOTP setup link to '+email+'?\nThis clears existing TOTP state.'))return;
    const r=await api('/admin/resend-setup',{method:'POST',body:JSON.stringify({user_id:key,email})});
    if(r.ok&&r.data?.success)toast('Setup email sent to '+email,'ok');
    else toast('Failed: '+(r.data?.error||'unknown'),'err');
  }else if(action==='plan'){
    const np=prompt('New plan for '+esc(email||key)+' (community/pro/enterprise/trial):');
    if(!np)return;
    const r=await api('/admin/relay-detail',{method:'GET'});
    toast('Plan update requires Stripe integration — not yet wired','err');
  }else if(action==='reset-totp'){
    if(!email){toast('No email on record','err');return}
    if(!confirm('Reset TOTP for '+email+'?\n\nThis clears their authenticator state and sends a new setup email.'))return;
    const r=await api('/admin/resend-setup',{method:'POST',body:JSON.stringify({user_id:key,email})});
    if(r.ok&&r.data?.success)toast('Setup email sent to '+email,'ok');
    else toast('Failed: '+(r.data?.error||'unknown'),'err');
  }else if(action==='revoke'){
    if(!confirm('Revoke key '+key.slice(0,20)+'…?'))return;
    const r=await api('/keys/all/revoke',{method:'POST',body:JSON.stringify({key})});
    toast(r.ok?'Key revoked on all sectors':'Revoke failed: '+(r.data?.error||'unknown'),r.ok?'ok':'err');
    if(r.ok){LOADED.users=false;loadUsers();}
  }
}

function showNewKeyModal(){
  const o=document.createElement('div');
  o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(11,58,106,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px';
  o.innerHTML='<div style="background:#F8FAFC;border:1.5px solid rgba(11,58,106,.12);padding:28px;max-width:480px;width:100%">'+
    '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#475569;margin-bottom:16px">Create new API key</div>'+
    '<label class="l-lbl">Label</label><input id="nk-l" class="l-inp" placeholder="acme-corp"><br>'+
    '<label class="l-lbl">Plan</label><select id="nk-p" class="l-inp"><option value="community">community</option><option value="pro" selected>pro</option><option value="enterprise">enterprise</option><option value="trial">trial</option></select><br>'+
    '<label class="l-lbl">Email (optional)</label><input id="nk-e" class="l-inp" type="email" placeholder="client@example.com"><br>'+
    '<div style="display:flex;gap:10px;margin-top:8px">'+
    '<button onclick="doCreateKey()" class="btn" style="flex:1">Create key</button>'+
    '<button onclick="this.closest(\'[data-modal]\').remove()" class="btn out">Cancel</button>'+
    '</div><div id="nk-res" style="margin-top:12px;font-size:12px;font-family:\'IBM Plex Mono\',monospace"></div></div>';
  o.dataset.modal='1';
  o.addEventListener('click',e=>{if(e.target===o)o.remove();});
  document.body.appendChild(o);
}

async function doCreateKey(){
  const label=document.getElementById('nk-l').value.trim();
  const plan=document.getElementById('nk-p').value;
  const email=document.getElementById('nk-e').value.trim();
  if(!label){toast('Label required','err');return}
  const r=await api('/keys/all',{method:'POST',body:JSON.stringify({label,plan,email})});
  const res=document.getElementById('nk-res');
  if(r.ok&&r.data?.created?.length){
    const key=r.data.created[0]?.key||'(see response)';
    res.innerHTML='<div style="background:#fff;border:1px solid rgba(11,58,106,.12);padding:12px;word-break:break-all;color:#0B3A6A">'+esc(key)+'</div>'+
      '<div style="color:#059669;margin-top:6px">Key created. Save it — shown once.</div>';
    LOADED.users=false;
  }else{
    res.innerHTML='<div style="color:#dc2626">Failed: '+esc(r.data?.failed?.[0]?.error||r.data?.error||'unknown')+'</div>';
  }
}

/* ── Audit ───────────────────────────────────────────────────────────────── */
async function loadAudit(){
  const el=document.getElementById('tab-audit');
  el.innerHTML='<div class="empty"><span class="sp-icon"></span>Loading audit log…</div>';
  renderAuditShell(el);
  fetchAudit();
}

function renderAuditShell(el){
  el.innerHTML='<div class="card"><div class="card-hdr">Audit log</div>'+
    '<div class="fb">'+
      '<select id="a-event"><option value="">All events</option>'+
        ['signup','login','logout','setup_totp','activate_totp','revoke_session','plan_changed','delete_account'].map(e=>'<option>'+e+'</option>').join('')+
      '</select>'+
      '<input id="a-user" placeholder="User key prefix…" style="width:200px">'+
      '<select id="a-since"><option value="">All time</option><option value="1">Last hour</option><option value="24">Last 24h</option><option value="168">Last 7d</option></select>'+
      '<div class="sp"></div>'+
      '<button class="btn out" onclick="exportAuditCSV()">Export CSV</button>'+
      '<button class="btn" onclick="fetchAudit()">Refresh</button>'+
    '</div>'+
    '<div id="a-results"><div class="empty"><span class="sp-icon"></span>Loading…</div></div>'+
    '</div>';
}

async function fetchAudit(){
  const event=document.getElementById('a-event')?.value||'';
  const user=document.getElementById('a-user')?.value||'';
  const hours=parseInt(document.getElementById('a-since')?.value||0);
  const params=new URLSearchParams();
  if(event)params.set('event',event);
  if(user)params.set('user',user);
  if(hours)params.set('since',new Date(Date.now()-hours*3600000).toISOString());
  const r=await api('/admin/audit?'+params);
  const el=document.getElementById('a-results');
  if(!el)return;
  if(!r.ok){el.innerHTML='<div class="empty">Error loading audit log</div>';return}
  const events=r.data.events||[];
  if(!events.length){el.innerHTML='<div class="empty">No audit events match filters</div>';return}
  el.innerHTML='<table class="tbl"><thead><tr><th>Timestamp</th><th>Event</th><th>User</th><th>Details</th></tr></thead><tbody>'+
    events.map(e=>'<tr>'+
      '<td class="mono" style="font-size:11px;white-space:nowrap">'+esc(e.ts?new Date(e.ts).toISOString().replace('T',' ').slice(0,19):'—')+'</td>'+
      '<td><span class="chip active">'+esc(e.event_type||'—')+'</span></td>'+
      '<td class="mono" style="font-size:11px;color:#475569">'+esc((e.user_id||'').slice(0,20))+'</td>'+
      '<td><details><summary style="cursor:pointer;font-size:11px;color:#475569">show</summary><pre style="font-size:10px;font-family:\'IBM Plex Mono\',monospace;margin-top:4px;color:#0B3A6A;white-space:pre-wrap">'+esc(JSON.stringify(e.metadata||{},null,2))+'</pre></details></td>'+
    '</tr>').join('')+'</tbody></table>';
}

function exportAuditCSV(){
  const rows=document.querySelectorAll('#a-results tr');
  if(!rows.length)return;
  let csv='timestamp,event,user_id,metadata\n';
  rows.forEach(r=>{
    const cells=r.querySelectorAll('td');
    if(cells.length)csv+=[cells[0],cells[1],cells[2],''].map((c,i)=>'"'+(c?.textContent?.trim()||'').replace(/"/g,'""')+'"').join(',')+'\n';
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='paramant-audit-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

/* ── Billing ─────────────────────────────────────────────────────────────── */
async function loadBilling(){
  const el=document.getElementById('tab-billing');
  el.innerHTML='<div class="empty"><span class="sp-icon"></span>Loading…</div>';
  const r=await api('/admin/billing');
  if(!r.ok){el.innerHTML='<div class="empty">Error loading billing</div>';return}
  const d=r.data;
  const dist=d.plan_distribution||{};
  const total=Object.values(dist).reduce((a,b)=>a+b,0)||1;
  el.innerHTML=
    '<div class="banner stub">Payment integration pending — all figures reflect stub state. Stripe connection required to show real MRR and churn data.</div>'+
    '<div class="sg" style="grid-template-columns:repeat(3,1fr)">'+
      statCard('MRR (EUR)','€'+((d.mrr_eur||0)/100).toFixed(0))+
      statCard('Total customers',d.total_customers||0)+
      statCard('Churn this month',d.churn_this_month||0)+
    '</div>'+
    '<div class="g2">'+
      '<div class="card"><div class="card-hdr">Plan distribution</div>'+planBars(dist,total)+'</div>'+
      '<div class="card"><div class="card-hdr">Recent plan changes <small>'+( d.recent_checkouts?.length||0)+' events</small></div>'+
        (d.recent_checkouts&&d.recent_checkouts.length?
          '<table class="tbl"><thead><tr><th>Time</th><th>User</th><th>Event</th></tr></thead><tbody>'+
          d.recent_checkouts.map(e=>'<tr>'+
            '<td class="mono" style="font-size:11px">'+esc(e.ts?new Date(e.ts).toISOString().slice(0,10):'—')+'</td>'+
            '<td class="mono" style="font-size:11px;color:#475569">'+esc((e.user_id||'').slice(0,16))+'</td>'+
            '<td>'+esc(e.event_type||'—')+'</td>'+
          '</tr>').join('')+'</tbody></table>':
          '<div class="empty">No plan changes recorded yet</div>')+
      '</div>'+
    '</div>';
}

/* ── Relay ───────────────────────────────────────────────────────────────── */
async function loadRelay(){
  const el=document.getElementById('tab-relay');
  el.innerHTML='<div class="empty"><span class="sp-icon"></span>Loading relay data…</div>';
  renderRelayShell(el);
  fetchRelay();
  clearInterval(REFRESH.relay);
  REFRESH.relay=setInterval(fetchRelay,10000);
}

function renderRelayShell(el){
  el.innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'+
      '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#475569">Relay health — auto-refreshes every 10s</div>'+
      '<button class="btn out" onclick="fetchRelay()">Refresh now</button>'+
    '</div>'+
    '<div id="r-strip" class="rs"><div class="ri loading"><div class="ri-name">health</div><div class="ri-det">loading…</div></div><div class="ri loading"><div class="ri-name">legal</div><div class="ri-det">loading…</div></div><div class="ri loading"><div class="ri-name">finance</div><div class="ri-det">loading…</div></div><div class="ri loading"><div class="ri-name">iot</div><div class="ri-det">loading…</div></div></div>'+
    '<div id="r-cards" class="g2"></div>';
}

async function fetchRelay(){
  const r=await api('/admin/relay-detail');
  if(!r.ok)return;
  const sectors=r.data.sectors||{};
  const strip=document.getElementById('r-strip');
  if(strip)strip.innerHTML=Object.entries(sectors).map(([name,s])=>{
    const ok=!s.error;
    return '<div class="ri'+(ok?'':' offline')+'">'+
      '<div class="ri-name">'+esc(name)+'</div>'+
      '<div class="ri-det">'+(ok?'v'+esc(s.version||'?')+' · up '+Math.floor((s.uptime_s||0)/3600)+'h':esc(s.error))+'</div>'+
    '</div>';
  }).join('');
  const cards=document.getElementById('r-cards');
  if(cards)cards.innerHTML=Object.entries(sectors).map(([name,s])=>{
    if(s.error)return '<div class="card"><div class="card-hdr">'+esc(name)+' <small style="color:#dc2626">offline</small></div><div class="empty">'+esc(s.error)+'</div></div>';
    const st=s.stats||{};
    return '<div class="card"><div class="card-hdr">'+esc(name)+' relay<small>v'+esc(s.version||'?')+'</small></div>'+
      '<table class="tbl"><tbody>'+
        [['Uptime',Math.floor((s.uptime_s||0)/3600)+'h '+Math.floor(((s.uptime_s||0)%3600)/60)+'m'],
         ['Protocol',s.protocol||'—'],
         ['Blobs in flight',s.blobs||0],
         ['Inbound processed',st.inbound||0],
         ['Burned',st.burned||0],
         ['Webhooks sent',st.webhooks_sent||0],
        ].map(([k,v])=>'<tr><td style="color:#475569;font-size:12px">'+esc(k)+'</td><td class="mono">'+esc(v)+'</td></tr>').join('')+
      '</tbody></table></div>';
  }).join('');
}
