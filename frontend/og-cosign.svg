<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Paramant co-sign share card. Brand palette: petrol/navy ground, lime accents.
       Static shapes only (no CSS animation) so every element renders in a chat preview. -->
  <rect width="1200" height="630" fill="#0B3A6A"/>
  <rect y="470" width="1200" height="160" fill="#0A2C53"/>
  <rect width="96" height="10" fill="#B2FF3F"/>

  <!-- wordmark -->
  <text x="64" y="98" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="40" font-weight="800" fill="#F8FAFC" letter-spacing="-0.02em">Paramant</text>

  <!-- eyebrow -->
  <text x="66" y="184" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', monospace"
        font-size="25" fill="#B2FF3F" letter-spacing="0.14em">ENVELOPE &#183; CO-SIGN REQUEST</text>

  <!-- headline -->
  <text x="62" y="300" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="94" font-weight="800" fill="#F8FAFC" letter-spacing="-0.03em">Co-sign this</text>
  <text x="62" y="396" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="94" font-weight="800" fill="#F8FAFC" letter-spacing="-0.03em">envelope.</text>

  <!-- subline -->
  <text x="66" y="452" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', monospace"
        font-size="24" fill="#CFE0F2" letter-spacing="0.04em">Post-quantum signature &#183; ML-DSA-65</text>

  <!-- footer trust line -->
  <text x="66" y="556" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', monospace"
        font-size="21" fill="#7F9CC0" letter-spacing="0.05em">paramant.app &#183; the relay never sees your document or your key</text>

  <!-- ── signed-document motif (right) ───────────────────────────────────── -->
  <!-- soft envelope outline behind the document -->
  <g stroke="#3C6195" stroke-width="2.5" fill="none">
    <rect x="792" y="262" width="316" height="190" rx="10"/>
    <path d="M792 274 L950 372 L1108 274"/>
  </g>

  <!-- the document being signed -->
  <rect x="836" y="150" width="252" height="212" rx="9" fill="#E7EDF6" stroke="#CDD9E8" stroke-width="2"/>
  <g stroke="#56789F" stroke-width="5" stroke-linecap="round">
    <path d="M866 198 H1040"/>
    <path d="M866 224 H1040"/>
    <path d="M866 250 H988"/>
  </g>
  <!-- lime signature stroke -->
  <path d="M866 312 q24 -34 44 0 t44 0 q20 -24 32 -8" fill="none" stroke="#B2FF3F"
        stroke-width="8" stroke-linecap="round"/>
  <!-- lime verified seal -->
  <circle cx="1066" cy="186" r="32" fill="#0A1626" stroke="#B2FF3F" stroke-width="5"/>
  <path d="M1050 186 l11 12 l23 -27" fill="none" stroke="#B2FF3F" stroke-width="6.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
