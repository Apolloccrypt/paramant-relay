<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARAMANT — Developer Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0c0c;--surface:#111;--border:#1a1a1a;--text:#ededed;--muted:#888;--quiet:#555;--green:#2d6a4f;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;--mono:'SF Mono','Fira Code','Cascadia Code',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}
input,select,button{font-family:var(--font);font-size:13px}
a{color:var(--muted);text-decoration:none}
a:hover{color:var(--text)}
</style>
</head>
<body>
<div id="root"></div>
<script>
const RELAYS=[
  {l:"Health",u:"https://health.paramant.app",sector:"healthcare"},
  {l:"Finance",u:"https://finance.paramant.app",sector:"finance"},
  {l:"Legal",u:"https://legal.paramant.app",sector:"legal"},
  {l:"IoT",u:"https://iot.paramant.app",sector:"iot"},
];
const V={bg:"#0c0c0c",sur:"#111",b:"#1a1a1a",t:"#ededed",m:"#888",q:"#555",g:"#2d6a4f",
  font:"-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif",
  mono:"'SF Mono','Fira Code','Cascadia Code',monospace"};

let apiKey="",relay=RELAYS[0],data=null,health={},lastPoll=null,loading=false;
let testLog=[],testRunning=false;

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;")}

async function fetchHealth(){
  await Promise.all(RELAYS.map(async r=>{
    try{const res=await fetch(r.u+"/health",{signal:AbortSignal.timeout(4000)});
      health[r.u]=res.ok?await res.json():false}
    catch{health[r.u]=false}
  }));
  renderHealthBar();
}

async function fetchMonitor(){
  if(!apiKey)return;
  loading=true;softRender();
  try{
    const r=await fetch(relay.u+"/v2/monitor?k="+apiKey,{signal:AbortSignal.timeout(8000)});
    if(r.ok){data=await r.json();lastPoll=new Date()}
    else data=null;
    // Haal CT log op voor audit sectie
    if(data){
      try{
        const ct=await fetch(relay.u+"/v2/ct/log?limit=10",{signal:AbortSignal.timeout(5000)});
        if(ct.ok){const ctd=await ct.json();data.audit=ctd.entries||[]}
      }catch{}
    }
  }catch(e){}
  loading=false;softRender();
  // Update audit log na fetch
  const al=document.getElementById("audit-log");
  if(al&&data&&data.audit&&data.audit.length){
    al.innerHTML=data.audit.map(e=>
      `<div style="display:flex;gap:20px;font-size:11px;font-family:${V.mono};padding:4px 0;border-bottom:1px solid ${V.b}">
        <span style="color:${V.q};flex-shrink:0">${(e.iso||e.ts||"").slice(11,19)||"—"}</span>
        <span style="color:${e.device_hash?"#4a6a9c":V.m}">${esc(e.leaf_hash?(e.leaf_hash).slice(0,16)+"…":"—")}</span>
        <span style="color:${V.q}">index: ${e.index??""}</span>
      </div>`
    ).join("");
  } else if(al&&data){
    al.innerHTML=`<div style="font-size:12px;color:${V.q};font-family:${V.mono}">Geen audit entries</div>`;
  }
}

function addTestLog(msg,level="info"){
  const t=new Date().toLocaleTimeString();
  const sym={info:"·",ok:"✓",error:"✗",send:"→",recv:"←",warn:"⚠"}[level]||"·";
  const col={info:V.q,ok:V.g,error:"#8c3a3a",send:"#4a6a9c",recv:V.g,warn:"#8c7a2d"}[level]||V.q;
  testLog.push({t,sym,msg,col});
  if(testLog.length>50)testLog.shift();
  renderTestLog();
}

function renderTestLog(){
  const el=document.getElementById("test-log");
  if(!el)return;
  el.innerHTML=testLog.slice(-20).reverse().map(e=>
    `<div style="display:flex;gap:12px;padding:4px 0;border-bottom:1px solid ${V.b};font-size:12px;font-family:${V.mono}">
      <span style="color:${V.q};flex-shrink:0">${e.t}</span>
      <span style="color:${e.col};flex-shrink:0">${e.sym}</span>
      <span style="color:${V.m}">${esc(e.msg)}</span>
    </div>`
  ).join("");
}

async function runE2ETest(){
  if(testRunning){addTestLog("Test al actief","warn");return}
  if(!apiKey){addTestLog("Geen API key","error");return}
  testRunning=true;testLog=[];
  addTestLog("E2E test gestart — "+relay.u,"info");
  try{
    // Stap 1 — Health
    addTestLog("1/6 — Relay health check","info");
    const hd=await fetch(relay.u+"/health",{signal:AbortSignal.timeout(5000)}).then(r=>r.json());
    if(!hd.ok)throw new Error("Relay unhealthy");
    addTestLog("Relay v"+hd.version+" | uptime "+hd.uptime_s+"s","ok");

    // Stap 2 — API key
    addTestLog("2/6 — API key valideren","info");
    const kd=await fetch(relay.u+"/v2/check-key?k="+apiKey,{signal:AbortSignal.timeout(5000)}).then(r=>r.json());
    if(!kd.valid)throw new Error("API key ongeldig");
    addTestLog("Key geldig | plan: "+kd.plan,"ok");

    // Stap 3 — Upload blob (JSON format: sector relay verwacht {hash,payload,ttl_ms})
    addTestLog("3/6 — 5MB testblob uploaden...","info");
    const payload=new TextEncoder().encode("PARAMANT-E2E-"+Date.now());
    const blobBuf=new Uint8Array(5242880);
    blobBuf.set(payload);
    // SHA-256 hash van raw blob
    const hashBuf=await crypto.subtle.digest("SHA-256",blobBuf);
    const hash=Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    // Base64 encode in chunks (5MB past niet in één btoa call)
    let b64="";
    const chunk=8192;
    for(let i=0;i<blobBuf.length;i+=chunk){b64+=String.fromCharCode(...blobBuf.subarray(i,i+chunk));}
    b64=btoa(b64);
    const body=JSON.stringify({hash,payload:b64,ttl_ms:300000});
    const t0=Date.now();
    const up=await fetch(relay.u+"/v2/inbound",{
      method:"POST",
      headers:{"X-Api-Key":apiKey,"Content-Type":"application/json"},
      body,signal:AbortSignal.timeout(30000)
    });
    if(!up.ok){const err=await up.json().catch(()=>({}));throw new Error("Upload HTTP "+up.status+(err.error?" — "+err.error:""));}
    const upRes=await up.json();
    if(!upRes.ok&&!upRes.hash)throw new Error("Upload mislukt: "+(upRes.error||"onbekend"));
    const upMs=Date.now()-t0;
    addTestLog("Verstuurd in "+upMs+"ms | hash: "+hash.slice(0,16)+"...","ok");

    // Stap 4 — Status check
    addTestLog("4/6 — Status verificatie","info");
    const st=await fetch(relay.u+"/v2/status/"+hash,{
      headers:{"X-Api-Key":apiKey},signal:AbortSignal.timeout(5000)
    }).then(r=>r.json());
    if(!st.available)throw new Error("Blob niet beschikbaar na upload");
    addTestLog("Blob aanwezig in RAM | "+Math.round((st.size||5*1024*1024)/1024)+"KB","ok");

    // Stap 5 — Download + burn
    addTestLog("5/6 — Download + burn-on-read","info");
    const t1=Date.now();
    const dl=await fetch(relay.u+"/v2/outbound/"+hash,{
      headers:{"X-Api-Key":apiKey},signal:AbortSignal.timeout(30000)
    });
    if(!dl.ok)throw new Error("Download HTTP "+dl.status);
    const received=await dl.arrayBuffer();
    const dlMs=Date.now()-t1;
    addTestLog("Ontvangen in "+dlMs+"ms | "+Math.round(received.byteLength/1024)+"KB","ok");

    // Stap 6 — Burn verificatie
    addTestLog("6/6 — Burn verificatie","info");
    await new Promise(r=>setTimeout(r,300));
    const burned=await fetch(relay.u+"/v2/status/"+hash,{
      headers:{"X-Api-Key":apiKey}
    }).then(r=>r.json()).catch(()=>({available:false}));
    if(burned.available)throw new Error("Blob nog beschikbaar na read — burn-on-read defect");
    addTestLog("Blob vernietigd na download","ok");

    const total=upMs+dlMs;
    addTestLog("","info");
    addTestLog("E2E geslaagd in "+(upMs+dlMs)+"ms | upload: "+upMs+"ms | download: "+dlMs+"ms","ok");
    // Refresh monitor data
    fetchMonitor();
  }catch(e){addTestLog("Test mislukt: "+e.message,"error")}
  testRunning=false;
}

function statCard(label,val,sub,color){
  return`<div style="background:${V.sur};border:1px solid ${V.b};border-radius:6px;padding:20px">
    <div style="font-size:10px;font-family:${V.mono};color:${V.q};letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">${label}</div>
    <div style="font-size:26px;font-weight:600;letter-spacing:-.02em;color:${color||V.t}">${val!=null?val:"—"}</div>
    ${sub?`<div style="font-size:11px;color:${V.q};margin-top:4px">${sub}</div>`:""}
  </div>`
}

function renderHealthBar(){
  const el=document.getElementById("hbar");
  if(!el)return;
  el.innerHTML=RELAYS.map(r=>{
    const hd=health[r.u];const ok=hd&&(hd.ok||hd.status==='ok');const fail=hd===false;
    return`<span style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-family:${V.mono};border:1px solid ${ok?"#1a2a1a":fail?"#2a1a1a":V.b};color:${ok?V.g:fail?"#7a3a3a":V.q}">
      <span style="width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0"></span>
      ${r.l}${ok&&hd.uptime_s?" "+Math.floor(hd.uptime_s/3600)+"h":""}
    </span>`
  }).join("");
}

function softRender(){
  const el=document.getElementById("stats-grid");
  if(!el||!data)return;
  const d=data||{};const dl=d.delivery||{};const st=d.stats||{};
  const sr=dl.success_rate;
  const src=sr>=95?V.g:sr>=80?"#8c7a2d":"#8c3a3a";
  el.innerHTML=
    statCard("Sent",dl.total??st.inbound,"total blobs")+
    statCard("Acknowledged",dl.acked,"with ACK",V.g)+
    statCard("Success rate",sr!=null?sr+"%":null,null,src)+
    statCard("Avg latency",dl.avg_latency_ms!=null?dl.avg_latency_ms+"ms":null,"send → ACK","#4a6a9c")+
    statCard("In flight",d.blobs_in_flight,"in RAM","#8c7a2d")+
    statCard("Burned",st.burned,"burn-on-read")+
    statCard("Pending",dl.pending,null,dl.pending>0?"#8c7a2d":V.t)+
    statCard("Webhooks",st.webhooks_sent);

  const dt=document.getElementById("delivery-table");
  if(dt){
    if(d.history&&d.history.length){
      dt.innerHTML=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
        <thead><tr>${["Hash","Device","Size","Status","Auth","Age"].map(h=>`<th style="text-align:left;padding:10px 16px;font-size:10px;font-family:${V.mono};color:${V.q};letter-spacing:.06em;border-bottom:1px solid ${V.b};text-transform:uppercase">${h}</th>`).join("")}</tr></thead>
        <tbody>${d.history.map((it,i)=>`<tr style="background:${i%2===0?V.bg:V.sur}">
          <td style="padding:10px 16px;font-size:11px;color:${V.q};font-family:${V.mono}">${esc(it.hash||"")}</td>
          <td style="padding:10px 16px;font-size:12px;color:${V.m}">${esc(it.device||"—")}</td>
          <td style="padding:10px 16px;font-size:12px;color:${V.m}">${it.size?(it.size/1024).toFixed(1)+"KB":"—"}</td>
          <td style="padding:10px 16px;font-size:12px">${it.acked?`<span style="color:${V.g}">ACK ${it.latency_ms?it.latency_ms+"ms":""}</span>`:`<span style="color:#8c7a2d">pending</span>`}</td>
          <td style="padding:10px 16px;font-size:12px">${it.sig_verified?`<span style="color:${V.g}">verified</span>`:`<span style="color:${V.q}">—</span>`}</td>
          <td style="padding:10px 16px;font-size:11px;color:${V.q}">${it.sent_ts?Math.round((Date.now()-it.sent_ts)/1000)+"s":"—"}</td>
        </tr>`).join("")}</tbody>
      </table></div>`;
    } else {
      dt.innerHTML=`<div style="padding:24px 20px;font-size:12px;color:${V.q};font-family:${V.mono}">Geen bezorgingen in deze sessie</div>`;
    }
  }
  const pi=document.getElementById("poll-info");
  if(pi)pi.textContent=loading?"polling...":lastPoll?"↻ "+lastPoll.toLocaleTimeString():"";
}

function render(){
  if(!apiKey){
    document.getElementById("root").innerHTML=`
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px">
      <div style="width:100%;max-width:380px">
        <a href="/" style="font-family:${V.mono};font-size:13px;font-weight:500;letter-spacing:.08em;color:${V.m};text-decoration:none;display:block;margin-bottom:32px">PARAMANT / dashboard</a>
        <div id="hbar" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:32px"></div>
        <p style="font-size:13px;color:${V.q};margin-bottom:24px;line-height:1.6">Monitor delivery stats, run end-to-end tests, inspect the CT log, and debug your integration.</p>
        <label style="display:block;font-size:11px;font-family:${V.mono};color:${V.q};letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">API key</label>
        <input id="ki" placeholder="pgp_..." style="width:100%;background:${V.sur};border:1px solid ${V.b};border-radius:5px;padding:10px 14px;color:${V.t};font-size:13px;outline:none;margin-bottom:16px;font-family:${V.mono}">
        <label style="display:block;font-size:11px;font-family:${V.mono};color:${V.q};letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">Relay</label>
        <select id="rs" style="width:100%;background:${V.sur};border:1px solid ${V.b};border-radius:5px;padding:10px 14px;color:${V.t};font-size:13px;margin-bottom:24px">
          ${RELAYS.map(r=>`<option value="${r.u}">${r.l} — ${r.u.replace("https://","")}</option>`).join("")}
        </select>
        <button onclick="login()" style="width:100%;background:${V.t};color:${V.bg};border:none;border-radius:5px;padding:11px;font-size:13px;font-weight:500;cursor:pointer">Connect</button>
      </div>
    </div>`;
    renderHealthBar();
    document.getElementById("ki").addEventListener("keydown",e=>{if(e.key==="Enter")login()});
    return;
  }

  document.getElementById("root").innerHTML=`
  <nav style="display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;border-bottom:1px solid ${V.b};position:sticky;top:0;background:rgba(12,12,12,.95);z-index:100">
    <div style="display:flex;align-items:center;gap:24px">
      <a href="/" style="font-family:${V.mono};font-size:13px;font-weight:500;letter-spacing:.08em;color:${V.t}">PARAMANT</a>
      <span style="font-size:12px;color:${V.q};font-family:${V.mono}">/ dashboard</span>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <select id="rs2" style="background:${V.sur};border:1px solid ${V.b};border-radius:4px;padding:6px 10px;color:${V.t};font-size:12px;font-family:${V.mono}" onchange="changeRelay(this.value)">
        ${RELAYS.map(r=>`<option value="${r.u}" ${r.u===relay.u?"selected":""}>${r.l}</option>`).join("")}
      </select>
      <span id="poll-info" style="font-size:11px;color:${V.q};font-family:${V.mono}"></span>
      <a href="/ct-log" style="font-size:11px;color:${V.q}">CT log</a>
      <button onclick="logout()" style="background:none;border:1px solid ${V.b};color:${V.q};border-radius:4px;padding:5px 12px;font-size:11px;cursor:pointer">Sign out</button>
    </div>
  </nav>

  <div style="max-width:1100px;margin:0 auto;padding:32px">
    <div id="hbar" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px"></div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px" id="stats-grid">
      ${[1,2,3,4,5,6,7,8].map(()=>`<div style="background:${V.sur};border:1px solid ${V.b};border-radius:6px;padding:20px;opacity:.3"><div style="height:26px;background:${V.b};border-radius:3px"></div></div>`).join("")}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div style="background:${V.sur};border:1px solid ${V.b};border-radius:6px;overflow:hidden">
        <div style="padding:14px 20px;border-bottom:1px solid ${V.b};display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:12px;font-family:${V.mono};color:${V.q};letter-spacing:.04em;text-transform:uppercase">E2E Test trail</span>
          <button onclick="runE2ETest()" style="background:${V.t};color:${V.bg};border:none;border-radius:4px;padding:5px 14px;font-size:11px;font-weight:500;cursor:pointer;font-family:${V.mono}">Run test</button>
        </div>
        <div id="test-log" style="padding:16px 20px;min-height:200px;max-height:320px;overflow-y:auto">
          <div style="font-size:12px;color:${V.q};font-family:${V.mono}">Click "Run test" to verify the full send → relay → receive → burn flow.</div>
        </div>
      </div>

      <div style="background:${V.sur};border:1px solid ${V.b};border-radius:6px;overflow:hidden">
        <div style="padding:14px 20px;border-bottom:1px solid ${V.b}">
          <span style="font-size:12px;font-family:${V.mono};color:${V.q};letter-spacing:.04em;text-transform:uppercase">Quick start</span>
        </div>
        <div style="padding:20px;font-family:${V.mono};font-size:12px;line-height:2;color:${V.q}">
          <div style="margin-bottom:8px"># Install</div>
          <div style="color:${V.m}">pip install paramant-sdk</div><br>
          <div># Receive</div>
          <div style="color:${V.m}">python3 paramant-receiver.py \\</div>
          <div style="color:${V.m}">  --key <span style="color:${V.t}">${apiKey}</span> \\</div>
          <div style="color:${V.m}">  --device my-device \\</div>
          <div style="color:${V.m}">  --output /tmp/received/</div><br>
          <div># Send</div>
          <div style="color:${V.m}">python3 paramant-sender.py \\</div>
          <div style="color:${V.m}">  --key <span style="color:${V.t}">${apiKey}</span> \\</div>
          <div style="color:${V.m}">  --device my-device \\</div>
          <div style="color:${V.m}">  --file document.pdf</div>
        </div>
      </div>
    </div>

    <div style="background:${V.sur};border:1px solid ${V.b};border-radius:6px;margin-bottom:16px;overflow:hidden">
      <div style="padding:14px 20px;border-bottom:1px solid ${V.b};display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:12px;font-family:${V.mono};color:${V.q};letter-spacing:.04em;text-transform:uppercase">Recent deliveries</span>
        <span style="font-size:11px;color:${V.q}">Relay: ${relay.l}</span>
      </div>
      <div id="delivery-table">
        <div style="padding:40px;text-align:center;font-size:13px;color:${V.q}">Loading...</div>
      </div>
    </div>

    <div style="background:${V.sur};border:1px solid ${V.b};border-radius:6px;overflow:hidden">
      <div style="padding:14px 20px;border-bottom:1px solid ${V.b};display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:12px;font-family:${V.mono};color:${V.q};letter-spacing:.04em;text-transform:uppercase">Merkle audit log</span>
        <a href="/ct-log" style="font-size:11px;color:${V.q}">CT log →</a>
      </div>
      <div id="audit-log" style="padding:16px 20px;min-height:80px">
        <div style="font-size:12px;color:${V.q};font-family:${V.mono}">Loading...</div>
      </div>
    </div>
  </div>`;

  renderHealthBar();
  if(data)softRender();
  fetchMonitor();

  if(data&&data.audit&&data.audit.length){
    document.getElementById("audit-log").innerHTML=data.audit.map(e=>
      `<div style="display:flex;gap:20px;font-size:11px;font-family:${V.mono};padding:4px 0;border-bottom:1px solid ${V.b}">
        <span style="color:${V.q};flex-shrink:0">${(e.ts||"").slice(11,19)}</span>
        <span style="color:${e.event&&e.event.includes("ack")?V.g:e.event&&e.event.includes("inbound")?"#4a6a9c":V.m}">${esc(e.event||"")}</span>
        <span style="color:${V.q}">${esc(e.hash||"")}${e.device?" · "+esc(e.device):""}${e.latency_ms?" · "+e.latency_ms+"ms":""}</span>
      </div>`
    ).join("");
  }
}

function login(){
  const k=document.getElementById("ki").value.trim();
  const u=document.getElementById("rs").value;
  if(!k.startsWith("pgp_"))return;
  apiKey=k;relay=RELAYS.find(r=>r.u===u)||RELAYS[0];
  render();setInterval(fetchMonitor,5000);
}
function logout(){apiKey="";data=null;testLog=[];render()}
function changeRelay(u){relay=RELAYS.find(r=>r.u===u)||RELAYS[0];fetchMonitor()}

fetchHealth();setInterval(fetchHealth,30000);render();
</script>
</body>
</html>
