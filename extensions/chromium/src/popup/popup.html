<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paramant</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>

<div id="popup-container">
  <header>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <rect x="5" y="11" width="14" height="10" stroke="#0B3A6A" stroke-width="1.5" fill="none"/>
      <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#0B3A6A" stroke-width="1.5" fill="none"/>
      <circle cx="12" cy="16" r="1.5" fill="#1D4ED8"/>
    </svg>
    <h1>Paramant</h1>
  </header>

  <!-- State: checking session -->
  <div id="state-loading" class="state">
    <div class="loading-indicator" aria-label="Checking session…"></div>
  </div>

  <!-- State: not logged in -->
  <div id="state-login" class="state hidden">
    <p class="lede">Sign in to send encrypted attachments.</p>

    <form id="login-form" novalidate>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required
             autocomplete="username" autofocus
             placeholder="you@example.com">

      <label for="totp">6-digit code</label>
      <input type="text" id="totp" name="totp" required
             inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
             autocomplete="one-time-code" placeholder="• • • • • •">

      <button type="submit" id="submit-btn">Sign in</button>
      <div id="error" class="error" role="alert" aria-live="polite"></div>
    </form>

    <p class="footer-text">
      No account? <a href="https://paramant.app/request-key" target="_blank" rel="noopener">Get one</a>
    </p>
  </div>

  <!-- State: logged in -->
  <div id="state-logged-in" class="state hidden">
    <div class="status">
      <span class="status-dot" aria-hidden="true"></span>
      <div class="status-info">
        <div class="status-email" id="status-email">—</div>
        <div class="status-detail">Session active · <span id="session-timer">—</span></div>
      </div>
    </div>

    <p class="help-text">
      Open Gmail or Outlook, then click the <strong>Paramant</strong> button next to "Attach files".
    </p>

    <button id="logout-btn" class="btn-secondary">Sign out</button>
  </div>
</div>

<script src="popup.js" type="module"></script>
</body>
</html>
