name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # NOTE: sdk-js and sdk-py tests moved to the standalone repo
  # https://github.com/Apolloccrypt/paramant-sdk (with the cross-impl
  # conformance suite). This workflow now covers the relay only.
  shell-syntax:
    name: shell — bash -n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Bash syntax check on all .sh files
        run: |
          set -e
          find . -name '*.sh' \
            -not -path './node_modules/*' \
            -not -path '*/node_modules/*' \
            -not -path '*/.git/*' \
            -not -path '*/build/*' \
            -not -path '*/dist/*' \
            -print0 \
          | xargs -0 -n1 bash -n
          echo "All shell scripts parse OK."

  frontend-cache-bust:
    name: frontend — cache-bust guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: All local css/js links must carry a single ?v= cache-bust
        run: scripts/check-cache-bust.sh

  relay-crypto-tests:
    name: relay - crypto suite (@paramant/core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      # @paramant/core is the Rust NAPI binding in the sibling paramant-core
      # repo. Until it is published to npm it is a dev file-link, so build it
      # here (as paramant-core's own CI does) to gate the relay crypto suite's
      # byte-compatibility against the binding. Interim until publish.
      - name: Install liboqs build deps
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang libclang-dev
      # Pin paramant-core to a fixed commit so the crypto byte-compat gate runs
      # against a known revision, not a moving HEAD. Bump this SHA deliberately
      # (and review the diff) when adopting a new paramant-core.
      - name: Build @paramant/core (sibling checkout, pinned)
        env:
          PARAMANT_CORE_SHA: 45a3d3521adda7924692d58be5db60d5b094371f
        run: |
          git clone --no-checkout https://github.com/Apolloccrypt/paramant-core.git "${GITHUB_WORKSPACE}/../paramant-core"
          cd "${GITHUB_WORKSPACE}/../paramant-core"
          git checkout "${PARAMANT_CORE_SHA}"
          rustup show
          cargo build -p paramant-core-node --release
          cp target/release/libparamant_core_node.so crates/paramant-core-node/index.node
      - name: Install relay deps (incl. file-linked @paramant/core)
        working-directory: relay
        run: npm install
      - name: Relay crypto suite
        working-directory: relay
        run: node --test $(find crypto -name '*.test.js')

  relay-unit-tests:
    name: relay - unit suite (no native deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      # Pure-JS units: account-split schema (keys-table), static-serve, envelope
      # binding, webauthn helpers. No @paramant/core build and no Redis, so the
      # relay/test suite that previously had zero CI coverage now gates here.
      - name: Relay unit suite
        working-directory: relay
        run: node --test test/*.test.js

      # Root integration suites (tests/*.mjs): dependency-injected, node builtins
      # only (no @paramant/core, no Redis, no npm install). Excludes the Playwright
      # browser e2e (sign-full, vault-filename), which run in the sign-e2e workflow.
      # Gates the ParaSign open-API conformance suite + key-issuance + pdf-ops that
      # previously ran in no workflow at all.
      - name: Root integration suites (no browser)
        run: node --test $(ls tests/*.mjs | grep -vE 'sign-full|vault-filename')

  admin-unit-tests:
    name: admin - unit suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Admin unit suite
        working-directory: admin
        run: node --test test/*.test.js
