name: CSP inline-script check

on:
  pull_request:
    paths:
      - 'frontend/**'
  push:
    branches: [main]

jobs:
  csp-inline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Geen inline JS onder script-src 'self'
        run: ./scripts/check-csp-inline.sh
