name: Release ParaShare FileLink

on:
  push:
    branches:
      - main
    paths:
      - "thunderbird-filelink/**"
      - ".github/workflows/release-thunderbird-filelink.yml"

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # required to read all tags

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Compute next version
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag --list 'filelink-v*' --sort=-version:refname | head -1)
          if [[ -z "$LATEST" ]]; then
            BASE=$(jq -r '.version' thunderbird-filelink/manifest.json)
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=-1
          else
            VER="${LATEST#filelink-v}"
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
          fi
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Bump version in manifest.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' \
            thunderbird-filelink/manifest.json > _tmp.json
          mv _tmp.json thunderbird-filelink/manifest.json

      - name: Commit bumped manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add thunderbird-filelink/manifest.json
          if git diff --staged --quiet; then
            echo "manifest unchanged, skipping commit"
          else
            git commit -m "chore: bump filelink to ${{ steps.version.outputs.version }} [skip ci]"
            git push
          fi

      - name: Package .xpi
        run: |
          cd thunderbird-filelink
          zip -r ../parashare-filelink.xpi . \
            -x "README.md"

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sign Thunderbird extension
        if: ${{ secrets.THUNDERBIRD_AMO_ISSUER != '' && secrets.THUNDERBIRD_AMO_SECRET != '' }}
        run: |
          web-ext sign \
          --api-key=${{ secrets.THUNDERBIRD_AMO_ISSUER }} \
          --api-secret=${{ secrets.THUNDERBIRD_AMO_SECRET }} \
          --source-dir=./thunderbird-filelink \
          --artifacts-dir=./web-ext-artifacts \
          --channel=listed &&
          cp web-ext-artifacts/*.xpi parashare-filelink.xpi
        env:
          NODE_ENV: production

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: "filelink-v${{ steps.version.outputs.version }}"
          name: "ParaShare FileLink v${{ steps.version.outputs.version }}"
          body: |
            Automated release of the ParaShare FileLink Thunderbird extension.

            **Install:** Thunderbird → Add-ons and Themes → Gear → Install Add-on From File → select `parashare-filelink.xpi`
          files: parashare-filelink.xpi
          fail_on_unmatched_files: true
