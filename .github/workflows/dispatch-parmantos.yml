name: Notify ParamantOS on relay push

# Sends a repository_dispatch to Apolloccrypt/ParamantOS whenever main is pushed.
# ParamantOS then updates paramant-relay.nix with the new SHA and rebuilds the ISO.
#
# Required secret in Apolloccrypt/paramant-relay:
#   PARMANTOS_DISPATCH_TOKEN — fine-grained PAT with:
#     - Repository: Apolloccrypt/ParamantOS
#     - Permissions: Actions (write), Contents (write)
#   Generate at: https://github.com/settings/tokens?type=beta

on:
  push:
    branches: [main]
    paths:
      - 'relay/**'          # Only trigger when relay code changes
      - 'relay/package*.json'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch relay-updated to ParamantOS
        run: |
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PARMANTOS_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Apolloccrypt/ParamantOS/dispatches \
            -d "{\"event_type\":\"relay-updated\",\"client_payload\":{\"sha\":\"${{ github.sha }}\",\"ref\":\"${{ github.ref }}\",\"run_id\":\"${{ github.run_id }}\"}}"

          echo "Dispatched relay-updated to Apolloccrypt/ParamantOS for SHA ${{ github.sha }}"
