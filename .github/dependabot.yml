version: 2

updates:
  # npm – fly-relay
  - package-ecosystem: "npm"
    directory: "/fly-relay"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "fly-relay"

  # npm – relay
  - package-ecosystem: "npm"
    directory: "/relay"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "relay"

  # npm – sdk-js
  - package-ecosystem: "npm"
    directory: "/sdk-js"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "sdk-js"

  # pip – sdk-py (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/sdk-py"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "sdk-py"

  # Docker – fly-relay
  - package-ecosystem: "docker"
    directory: "/fly-relay"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
