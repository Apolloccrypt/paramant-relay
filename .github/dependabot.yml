version: 2

updates:
  # npm – relay
  - package-ecosystem: "npm"
    directory: "/relay"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "relay"

  # Docker – fly-relay
  - package-ecosystem: "docker"
    directory: "/fly-relay"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
