# PARAMANT self-hosted relay stack
# Docs: https://github.com/Apolloccrypt/paramant-relay#self-hosting
#
# Quick start:
#   cp .env.example .env && nano .env
#   docker compose up -d

# ── Image version pin ─────────────────────────────────────────────────────────
# Pin to exact version — never use :latest in production.
# Build locally:  build: ./relay  (comment out image:)
x-relay-image: &relay-image mtty001/relay:2.3.3

# ── Shared security baseline for all relay containers ─────────────────────────
x-relay-hardening: &relay-hardening
  security_opt:
    - no-new-privileges:true   # block privilege escalation via setuid/setgid
  cap_drop:
    - ALL                      # drop all Linux capabilities; relay needs none
  read_only: true              # root filesystem is read-only
  tmpfs:
    - /tmp:size=64m,mode=1777  # writable /tmp only, max 64 MB, sticky bit

# ── Shared resource limits ────────────────────────────────────────────────────
x-relay-resources: &relay-resources
  deploy:
    resources:
      limits:
        memory: 1500m          # RAM_LIMIT_MB(1024) + OS + Node overhead
        cpus: '1.0'
      reservations:
        memory: 256m

services:
  relay-health:
    image: *relay-image
    # build: ./relay  # uncomment to build locally instead of pulling
    restart: unless-stopped
    <<: [*relay-hardening, *relay-resources]
    environment:
      PORT: "3005"
      SECTOR: "health"
      RELAY_MODE: "${RELAY_MODE:-ghost_pipe}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      USERS_FILE: "/data/users.json"
      RAM_RESERVE_MB: "${RAM_RESERVE_MB:-256}"
      RAM_LIMIT_MB: "${RAM_LIMIT_MB:-1024}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      TOTP_SECRET: "${TOTP_SECRET:-}"
    ports:
      - "127.0.0.1:3005:3005"  # localhost only — CLI + admin panel access
    volumes:
      - relay-health-data:/data
    networks:
      - relay-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  relay-legal:
    image: *relay-image
    # build: ./relay
    restart: unless-stopped
    <<: [*relay-hardening, *relay-resources]
    environment:
      PORT: "3002"
      SECTOR: "legal"
      RELAY_MODE: "${RELAY_MODE:-ghost_pipe}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      USERS_FILE: "/data/users.json"
      RAM_RESERVE_MB: "${RAM_RESERVE_MB:-256}"
      RAM_LIMIT_MB: "${RAM_LIMIT_MB:-1024}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - relay-legal-data:/data
    networks:
      - relay-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  relay-finance:
    image: *relay-image
    # build: ./relay
    restart: unless-stopped
    <<: [*relay-hardening, *relay-resources]
    environment:
      PORT: "3003"
      SECTOR: "finance"
      RELAY_MODE: "${RELAY_MODE:-ghost_pipe}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      USERS_FILE: "/data/users.json"
      RAM_RESERVE_MB: "${RAM_RESERVE_MB:-256}"
      RAM_LIMIT_MB: "${RAM_LIMIT_MB:-1024}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    ports:
      - "127.0.0.1:3003:3003"
    volumes:
      - relay-finance-data:/data
    networks:
      - relay-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  relay-iot:
    image: *relay-image
    # build: ./relay
    restart: unless-stopped
    <<: [*relay-hardening, *relay-resources]
    environment:
      PORT: "3004"
      SECTOR: "iot"
      RELAY_MODE: "${RELAY_MODE:-iot}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      USERS_FILE: "/data/users.json"
      RAM_RESERVE_MB: "${RAM_RESERVE_MB:-256}"
      RAM_LIMIT_MB: "${RAM_LIMIT_MB:-1024}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    ports:
      - "127.0.0.1:3004:3004"
    volumes:
      - relay-iot-data:/data
    networks:
      - relay-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  admin:
    build: ./admin
    image: paramant-admin:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    environment:
      PORT: "4200"
      BASE_PATH: "/admin"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      RELAY_HEALTH:  "http://relay-health:3005"
      RELAY_LEGAL:   "http://relay-legal:3002"
      RELAY_FINANCE: "http://relay-finance:3003"
      RELAY_IOT:     "http://relay-iot:3004"
    networks:
      - relay-internal
    depends_on:
      - relay-health
      - relay-legal
      - relay-finance
      - relay-iot

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE    # required to bind ports 80 and 443
      - CHOWN               # nginx needs to chown temp files
      - DAC_OVERRIDE        # nginx needs to read ssl certs
      - SETUID              # nginx drops from root to worker user
      - SETGID
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '1.0'
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./deploy/nginx-selfhost.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/docker-entrypoint.sh:/docker-entrypoint.d/99-paramant.sh:ro
      - paramant-certs:/etc/nginx/certs:ro
    networks:
      - relay-internal
      - relay-external
    depends_on:
      - relay-health
      - relay-legal
      - relay-finance
      - relay-iot
      - admin

volumes:
  paramant-certs:
  relay-health-data:
  relay-legal-data:
  relay-finance-data:
  relay-iot-data:

networks:
  relay-internal:
    driver: bridge
    internal: true   # relay containers not reachable from internet — only via nginx
  relay-external:
    driver: bridge   # nginx uses this for certbot ACME challenges + upstream DNS
