
# PARAMANT self-hosted relay stack
# Docs: https://github.com/Apolloccrypt/paramant-relay#self-hosting
#
# Quick start:
#   cp .env.example .env && nano .env
#   docker compose up -d

services:
  relay-health:
    image: mtty001/relay:latest  # pull from Docker Hub; replace with: build: ./relay  to build locally
    # build: ./relay
    restart: unless-stopped
    environment:
      PORT: "3005"
      SECTOR: "health"
      RELAY_MODE: "${RELAY_MODE:-ghost_pipe}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      USERS_FILE: "/data/users.json"
      RAM_RESERVE_MB: "${RAM_RESERVE_MB:-256}"
      RAM_LIMIT_MB: "${RAM_LIMIT_MB:-1024}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      TOTP_SECRET: "${TOTP_SECRET:-}"
    volumes:
      - relay-health-data:/data
    networks:
      - relay-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3005/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  relay-legal:
    image: mtty001/relay:latest
    # build: ./relay
    restart: unless-stopped
    environment:
      PORT: "3002"
      SECTOR: "legal"
      RELAY_MODE: "${RELAY_MODE:-ghost_pipe}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      USERS_FILE: "/data/users.json"
      RAM_RESERVE_MB: "${RAM_RESERVE_MB:-256}"
      RAM_LIMIT_MB: "${RAM_LIMIT_MB:-1024}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - relay-legal-data:/data
    networks:
      - relay-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  relay-finance:
    image: mtty001/relay:latest
    # build: ./relay
    restart: unless-stopped
    environment:
      PORT: "3003"
      SECTOR: "finance"
      RELAY_MODE: "${RELAY_MODE:-ghost_pipe}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      USERS_FILE: "/data/users.json"
      RAM_RESERVE_MB: "${RAM_RESERVE_MB:-256}"
      RAM_LIMIT_MB: "${RAM_LIMIT_MB:-1024}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - relay-finance-data:/data
    networks:
      - relay-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  relay-iot:
    image: mtty001/relay:latest
    # build: ./relay
    restart: unless-stopped
    environment:
      PORT: "3004"
      SECTOR: "iot"
      RELAY_MODE: "${RELAY_MODE:-iot}"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      USERS_FILE: "/data/users.json"
      RAM_RESERVE_MB: "${RAM_RESERVE_MB:-256}"
      RAM_LIMIT_MB: "${RAM_LIMIT_MB:-1024}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - relay-iot-data:/data
    networks:
      - relay-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3004/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./deploy/nginx-selfhost.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/docker-entrypoint.sh:/docker-entrypoint.d/99-paramant.sh:ro
      - paramant-certs:/etc/nginx/certs:ro
    networks:
      - relay-internal
      - relay-external
    depends_on:
      - relay-health
      - relay-legal
      - relay-finance
      - relay-iot

volumes:
  paramant-certs:
  relay-health-data:
  relay-legal-data:
  relay-finance-data:
  relay-iot-data:

networks:
  relay-internal:
    driver: bridge
    internal: true   # relays only reachable via nginx
  relay-external:
    driver: bridge   # nginx uses this for certbot ACME + upstream DNS
