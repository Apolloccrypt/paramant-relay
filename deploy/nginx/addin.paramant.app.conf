server {
    listen 443 ssl http2;
    server_name addin.paramant.app;

    root /home/paramant/addin;
    index taskpane.html;

    # Required voor Office.js cross-origin requests
    add_header Access-Control-Allow-Origin "https://outlook.office.com https://outlook.office365.com https://outlook.live.com" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # Cache static assets
    location ~* \.(js|css|png|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # SSL — hergebruik bestaande Let's Encrypt wildcard of voeg addin toe aan cert
    ssl_certificate /etc/letsencrypt/live/paramant.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paramant.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
}

server {
    listen 80;
    server_name addin.paramant.app;
    return 301 https://$host$request_uri;
}
