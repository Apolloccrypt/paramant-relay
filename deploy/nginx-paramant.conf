server {
    listen 127.0.0.1:8080;
    root /home/paramant/app;
    index index.html;
    access_log off;
    set_real_ip_from 127.0.0.1;
    real_ip_header CF-Connecting-IP;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://relay.paramant.app wss://relay.paramant.app https://health.paramant.app wss://health.paramant.app https://legal.paramant.app wss://legal.paramant.app https://finance.paramant.app wss://finance.paramant.app https://iot.paramant.app wss://iot.paramant.app https://paramant-ghost-pipe.fly.dev wss://paramant-ghost-pipe.fly.dev; script-src 'self' 'unsafe-inline' https://esm.sh https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:" always;

    location = /r34ct0r {
        allow YOUR_ADMIN_IP;
        deny all;
        alias /home/paramant/app/r34ct0r.html;
        default_type text/html;
    }
    location = /admin { return 301 https://$host/r34ct0r; }
    location = /r34ct0r.html {
        allow YOUR_ADMIN_IP;
        deny all;
        alias /home/paramant/app/r34ct0r.html;
        default_type text/html;
    }

    location = /outlook/taskpane {
        alias /home/paramant/app/outlook/taskpane.html;
        default_type text/html;
        add_header Access-Control-Allow-Origin "https://outlook.office.com" always;
        add_header Access-Control-Allow-Origin "https://outlook.office365.com" always;
    }
    location = /outlook/commands {
        alias /home/paramant/app/outlook/commands.html;
        default_type text/html;
    }
    location = /outlook/manifest.xml {
        alias /home/paramant/app/outlook/manifest.xml;
        default_type application/xml;
    }
    location = /drop { return 301 https://$host/parashare; }
    location = /license { return 301 /privacy; }
    location = /legal { return 301 https://paramant.app/; }
    location = /api/check-key {
        proxy_pass http://127.0.0.1:3001/v2/check-key;
        proxy_set_header Host $host;
    }
location = /users.json { deny all; return 404; }    location ~ /.env { deny all; return 404; }    location ~ /.git { deny all; return 404; }
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
    # DICOM Gateway
    location /dicom/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host $host;
        client_max_body_size 50M;
    }


    # Admin panel API proxy (same-origin, geen CORS issues)
    location /rp/health/ {
        client_max_body_size 30M;
        proxy_pass http://127.0.0.1:3005/;
        proxy_http_version 1.1;
        proxy_set_header Host health.paramant.app;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
    }
    location /rp/legal/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host legal.paramant.app;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
    }
    location /rp/finance/ {
        proxy_pass http://127.0.0.1:3003/;
        proxy_http_version 1.1;
        proxy_set_header Host finance.paramant.app;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
    }
    location /rp/iot/ {
        proxy_pass http://127.0.0.1:3004/;
        proxy_http_version 1.1;
        proxy_set_header Host iot.paramant.app;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
    }
    location /rp/fly/ {
        proxy_pass https://paramant-ghost-pipe.fly.dev/;
        proxy_ssl_server_name on;
        proxy_set_header Host paramant-ghost-pipe.fly.dev;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
    }


}

server {
    listen 127.0.0.1:8081;
    access_log off;

    location = /outlook/taskpane {
        alias /home/paramant/app/outlook/taskpane.html;
        default_type text/html;
        add_header Access-Control-Allow-Origin "https://outlook.office.com" always;
        add_header Access-Control-Allow-Origin "https://outlook.office365.com" always;
    }
    location = /outlook/commands {
        alias /home/paramant/app/outlook/commands.html;
        default_type text/html;
    }
    location = /outlook/manifest.xml {
        alias /home/paramant/app/outlook/manifest.xml;
        default_type application/xml;
    }
location = /users.json { deny all; return 404; }    location ~ /.env { deny all; return 404; }    location ~ /.git { deny all; return 404; }
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header X-Real-IP '';
        proxy_set_header X-Forwarded-For '';
        proxy_read_timeout 3600s;
    }
}

