global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    relay: 'paramant'

scrape_configs:

  # Relay sectors — target host.docker.internal (resolves to host gateway)
  # Works whether relay runs native (systemd) or Docker with host port binding
  - job_name: 'paramant-health'
    metrics_path: '/metrics'
    authorization:
      credentials_file: /etc/prometheus/token
    static_configs:
      - targets: ['host.docker.internal:3005']
        labels:
          sector: 'health'

  - job_name: 'paramant-legal'
    metrics_path: '/metrics'
    authorization:
      credentials_file: /etc/prometheus/token
    static_configs:
      - targets: ['host.docker.internal:3002']
        labels:
          sector: 'legal'

  - job_name: 'paramant-finance'
    metrics_path: '/metrics'
    authorization:
      credentials_file: /etc/prometheus/token
    static_configs:
      - targets: ['host.docker.internal:3003']
        labels:
          sector: 'finance'

  - job_name: 'paramant-iot'
    metrics_path: '/metrics'
    authorization:
      credentials_file: /etc/prometheus/token
    static_configs:
      - targets: ['host.docker.internal:3004']
        labels:
          sector: 'iot'
