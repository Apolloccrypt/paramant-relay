server {
    listen 80;
    server_name paramant.app health.paramant.app legal.paramant.app finance.paramant.app iot.paramant.app relay.paramant.app;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    server_name paramant.app;
    ssl_certificate /etc/letsencrypt/live/paramant.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paramant.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    location = /r34ct0r {
        allow 85.223.34.201;
        deny all;
        proxy_pass http://127.0.0.1:8080/r34ct0r;
        proxy_set_header Host $host;
    }
    location = /r34ct0r.html {
        allow 85.223.34.201;
        deny all;
        proxy_pass http://127.0.0.1:8080/r34ct0r.html;
        proxy_set_header Host $host;
    }
    location /admin/ {
        proxy_pass http://127.0.0.1:4200/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
    location = /install.sh { root /home/paramant/app; default_type text/plain; }
    location = /install-pi.sh { root /home/paramant/app; default_type text/plain; }
    location = /install-client.sh { root /home/paramant/app; default_type text/plain; }
    location = /compliance { return 301 /compliance/nis2; }
    location = /compliance/nis2 { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
    location = /compliance/iec62443 { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
    location = /compliance/nen7510 { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
    location /.well-known/ {
        root /home/paramant/app;
        default_type text/plain;
        add_header X-Robots-Tag 'noarchive' always;
        try_files $uri =404;
    }
    location = /security.txt {
        root /home/paramant/app;
        default_type text/plain;
    }
    location = /humans.txt {
        root /home/paramant/app;
        default_type text/plain;
    }
    location = /robots.txt {
        root /home/paramant/app;
        default_type text/plain;
    }
    location = /sitemap.xml {
        root /home/paramant/app;
        types { application/xml xml; }
    }

    # Relay API: admin endpoints are never exposed via the public apex.
    # /v2/admin/* is auth-gated at the relay (returns 401), but we 404 here
    # to avoid leaking the existence of the admin surface on paramant.app.
    location ~ ^/v2/admin { return 404; }

    # Public /v2/* endpoints proxy straight to the relay on :3000.
    # Mirrors the pattern used on relay.paramant.app so published docs
    # (e.g. /crypto-agility referencing /v2/capabilities) resolve on the apex.
    location /v2/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
    location = /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    location / { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
}

server {
    listen 443 ssl;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    server_name health.paramant.app;
    ssl_certificate /etc/letsencrypt/live/paramant.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paramant.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    client_body_timeout 300s;
    keepalive_timeout 120s;
    location / { proxy_pass http://127.0.0.1:3001; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_read_timeout 3600s; proxy_send_timeout 300s; }
}
