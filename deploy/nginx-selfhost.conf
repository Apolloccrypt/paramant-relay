# ── Global hardening (http-level, included inside http{} by nginx) ───────────
server_tokens off;

# ── Rate limiting zones ───────────────────────────────────────────────────────
# /v2/inbound   — upload: 5/min per IP (relay enforces per-key limits above this)
# /v2/pubkey    — key registration: 20/min per IP
# /v2/auth      — admin + auth endpoints: 10/min per IP (brute-force guard)
# /api/general  — everything else: 60/min per IP
# /health_check — health poll: 6/min per IP
limit_req_zone $binary_remote_addr zone=inbound:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=pubkey:10m     rate=20r/m;
limit_req_zone $binary_remote_addr zone=auth:10m       rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m        rate=60r/m;
limit_req_zone $binary_remote_addr zone=health_chk:10m rate=6r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

# ── Sector routing — map Host header to upstream ──────────────────────────────
# SNI routing fails when sectors share a domain; Host-header map works for both
# single-domain (?sector=health) and subdomain (health.example.com) setups.
upstream relay_health  { server relay-health:3005  max_fails=3 fail_timeout=10s; }
upstream relay_legal   { server relay-legal:3002   max_fails=3 fail_timeout=10s; }
upstream relay_finance { server relay-finance:3003 max_fails=3 fail_timeout=10s; }
upstream relay_iot     { server relay-iot:3004     max_fails=3 fail_timeout=10s; }

map $http_host $relay_upstream {
    default        relay_health;
    "~^health\."   relay_health;
    "~^legal\."    relay_legal;
    "~^finance\."  relay_finance;
    "~^iot\."      relay_iot;
}

# ── Minimal access log format (no URI/query — prevents API key exposure in logs) ──
log_format paramant_minimal '$remote_addr [$time_local] "$request_method $scheme://$host$uri '
                             '$server_protocol" $status $body_bytes_sent '
                             '"$http_user_agent" rt=$request_time';

# HTTP — ACME challenge passthrough only; all else → HTTPS
server {
    listen 80;
    server_name _;
    access_log /var/log/nginx/paramant_access.log paramant_minimal;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS — single server block; sector selected via map above
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate      /etc/nginx/certs/cert.pem;
    ssl_certificate_key  /etc/nginx/certs/key.pem;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  10m;
    ssl_session_tickets  off;          # forward-secrecy: disable session ticket resumption
    ssl_stapling         on;           # OCSP stapling
    ssl_stapling_verify  on;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size   35M;        # relay hard limit is ~30 MB; give overhead
    client_header_timeout  10s;
    client_body_timeout    60s;
    send_timeout           30s;
    keepalive_timeout      65s;
    limit_conn conn 20;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security   "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options             "DENY" always;
    add_header X-Content-Type-Options      "nosniff" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Referrer-Policy             "no-referrer" always;
    add_header Permissions-Policy          "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()" always;

    # ── Hide upstream version information ────────────────────────────────────
    proxy_hide_header Server;
    proxy_hide_header X-Powered-By;

    # ── Shared proxy defaults ────────────────────────────────────────────────
    proxy_http_version   1.1;
    proxy_set_header     Host              $host;
    proxy_set_header     X-Real-IP         $remote_addr;
    proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header     X-Forwarded-Proto $scheme;
    proxy_read_timeout   10s;

    # ── Access log ────────────────────────────────────────────────────────────
    # Log status + size only; no URI (avoids accidental API key logging from ?k= params)
    access_log /var/log/nginx/paramant_access.log paramant_minimal;

    # ── /health — public health check ────────────────────────────────────────
    location = /health {
        limit_req        zone=health_chk burst=3 nodelay;
        limit_req_status 429;
        proxy_pass       http://$relay_upstream;
        proxy_set_header X-Admin-Token $http_x_admin_token;
        proxy_read_timeout 10s;
    }

    # ── /v2/inbound — upload (most restricted) ───────────────────────────────
    location /v2/inbound {
        limit_req        zone=inbound burst=3 nodelay;
        limit_req_status 429;
        proxy_pass       http://$relay_upstream;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        client_max_body_size 35M;
    }

    # ── /v2/pubkey + /v2/did/register — key registration ────────────────────
    location ~ ^/v2/(pubkey|did) {
        limit_req        zone=pubkey burst=5 nodelay;
        limit_req_status 429;
        proxy_pass       http://$relay_upstream;
        proxy_set_header X-Api-Key    $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
        proxy_read_timeout 30s;
    }

    # ── /v2/admin + /v2/admin/* — admin endpoints ────────────────────────────
    location ~ ^/v2/admin {
        limit_req        zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass       http://$relay_upstream;
        proxy_set_header X-Api-Key     $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
        proxy_read_timeout 30s;
    }

    # ── /v2/mfa — TOTP brute-force guard ────────────────────────────────────
    location = /v2/mfa {
        limit_req        zone=auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass       http://$relay_upstream;
        proxy_set_header X-Api-Key     $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
        proxy_read_timeout 15s;
    }

    # ── /admin/ — admin panel (Express SPA) ─────────────────────────────────
    location /admin/ {
        limit_req        zone=auth burst=10 nodelay;
        limit_req_status 429;
        proxy_pass       http://admin:4200/admin/;
        proxy_redirect   off;
        proxy_read_timeout 30s;
    }

    # ── /ct, /ct/feed, /v2/sth — public CT log UI and signed tree head ─────────
    location ~ ^/(ct|ct/feed|v2/sth)(/|$) {
        limit_req        zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass       http://$relay_upstream;
        proxy_read_timeout 10s;
        add_header       Cache-Control "no-cache, no-store" always;
    }

    # ── Default — all other v2 API traffic ──────────────────────────────────
    location / {
        limit_req        zone=api burst=30 nodelay;
        limit_req_status 429;
        proxy_pass       http://$relay_upstream;
        proxy_set_header Upgrade     $http_upgrade;
        proxy_set_header Connection  "upgrade";
        proxy_set_header X-Api-Key   $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
        proxy_read_timeout 3600s;
    }
}
