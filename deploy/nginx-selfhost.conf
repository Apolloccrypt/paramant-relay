# PARAMANT self-hosted nginx config
# Place your TLS certs in deploy/certs/{cert.pem,key.pem}
# or replace ssl_certificate paths with your cert manager of choice.

upstream relay_health  { server relay-health:3005; }
upstream relay_legal   { server relay-legal:3002; }
upstream relay_finance { server relay-finance:3003; }
upstream relay_iot     { server relay-iot:3004; }

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# Health relay  (your-domain.com or health.your-domain.com)
server {
    listen 443 ssl;
    server_name health.localhost localhost;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass         http://relay_health;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}

