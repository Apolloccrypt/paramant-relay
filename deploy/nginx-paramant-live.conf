server {
    listen 127.0.0.1:8080;
    root /home/paramant/app;
    index index.html;
    access_log off;
    # Real client IP: the edge is Bunny.net -> Caddy (127.0.0.1) -> here. The
    # old CF-Connecting-IP header only existed under Cloudflare (removed in the
    # Bunny migration), so it never arrived and every request collapsed to
    # 127.0.0.1 -- turning per-IP rate limits into one global bucket. Trust the
    # local Caddy proxy and take the client IP from the forwarded chain instead.
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    # Security headers — single source of truth (deploy/nginx/snippets/). Also
    # re-included in any location that sets its own add_header (the static-asset
    # block below), because nginx add_header does not inherit once a location
    # defines its own — so CSP/HSTS can never be silently dropped from a response.
    include snippets/paramant-security-headers.conf;
    # HTML and every other non-asset response: cacheable but ALWAYS revalidated
    # (a cheap 304 via ETag), so a new deploy's HTML — nav links, hero CTAs — is
    # visible immediately instead of being served stale from the browser's
    # heuristic cache (root cause of the "ParaRules vanished" / dashboard-button
    # confusion). The versioned static-asset block overrides this with immutable.
    add_header Cache-Control "no-cache" always;

    location = /admin/ {
        alias /home/paramant/app/admin.html;
        default_type text/html;
    }
    location = /admin { return 301 https://$host/admin/; }
    location = /r34ct0r { return 301 https://$host/admin/; }
    location = /r34ct0r.html { return 301 https://$host/admin/; }

    location = /outlook/taskpane {
        alias /home/paramant/app/outlook/taskpane.html;
        default_type text/html;
        add_header Access-Control-Allow-Origin "https://outlook.office.com" always;
        add_header Access-Control-Allow-Origin "https://outlook.office365.com" always;
    }
    location = /outlook/commands {
        alias /home/paramant/app/outlook/commands.html;
        default_type text/html;
    }
    location = /outlook/manifest.xml {
        alias /home/paramant/app/outlook/manifest.xml;
        default_type application/xml;
    }
    # ── Gated tool routes (Model A): no tool markup served without a valid
    # session. Subrequest hits the existing authUser middleware via
    # /api/user/check (defined below). 401 -> redirect to /auth/login.
    # /verify and /get stay public (recipient path).
    location = /send       { auth_request /api/user/check; error_page 401 = @login_redirect; try_files /send.html       =404; }
    location = /parashare  { auth_request /api/user/check; error_page 401 = @login_redirect; try_files /parashare.html  =404; }
    location = /drop       { auth_request /api/user/check; error_page 401 = @login_redirect; try_files /drop.html       =404; }
    location = /sign       { auth_request /api/user/check; error_page 401 = @login_redirect; try_files /sign.html       =404; }
    # Hardcoded https:// because nginx listens on 127.0.0.1:8080 behind
    # Caddy; a bare /path redirect makes nginx synthesize an absolute URL
    # with the internal :8080 port, which is unreachable from outside.
    location @login_redirect { return 302 https://$host/auth/login?next=$uri; }

    # ── Developer dashboard: gated AND hidden ───────────────────────────────
    # auth_request /api/user/developer/check returns:
    #   200  allowlisted developer   -> serve /developer.html
    #   401  no session              -> @login_redirect
    #   403  logged in, not a dev    -> remap to 404 (@developer_hidden) so a
    #                                   logged-in non-developer cannot tell the
    #                                   page exists.
    # /developer.html is force-404'd so the static file can only be reached
    # through the gated /developer route, never directly.
    location = /developer {
        auth_request /api/user/developer/check;
        error_page 401 = @login_redirect;
        error_page 403 = @developer_hidden;
        try_files /developer.html =404;
    }
    location = /developer.html { return 404; }
    location @developer_hidden { return 404; }

    location = /signup { try_files /signup.html =404; }
    location = /signup/verified { try_files /signup/verified.html =404; }
    location = /account { try_files /account.html =404; }
    location /billing/checkout/ { try_files /billing/checkout.html =404; }
    location = /auth/login { try_files /auth/login.html =404; }
    location = /auth/backup { try_files /auth/backup.html =404; }
    location /auth/setup/ { try_files /auth/setup.html =404; }
    location = /auth/request-reset { try_files /auth/request-reset.html =404; }
    location /auth/reset-confirm/ { try_files /auth/reset-confirm.html =404; }
    location = /help { try_files /help/index.html =404; }
    location = /security { try_files /security.html =404; }
    location = /pentest-report-2026-04-08.txt { return 301 /security; }
    location = /license { try_files /license.html =404; }
    location /api/captcha/ {
        proxy_pass http://127.0.0.1:4200/admin/api/captcha/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 4k;
    }

    # Internal-only session-validity probe used by auth_request on gated
    # tool routes above. Placed before the broader /api/user/ block so the
    # exact-match wins. No login-rate-limit (this fires per page load, not
    # per login attempt) and no body forwarding (GET only).
    location = /api/user/check {
        internal;
        proxy_pass http://127.0.0.1:4200/admin/api/user/check;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    location = /api/user/developer/check {
        internal;
        proxy_pass http://127.0.0.1:4200/admin/api/user/developer/check;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    location /api/user/ {
        limit_req        zone=relay_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:4200/admin/api/user/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        client_max_body_size 64k;
    }
        location = /api/check-key {
        proxy_pass http://127.0.0.1:3001/v2/check-key;
        proxy_set_header Host $host;
    }
    location = /api/request-key {
        proxy_pass http://127.0.0.1:4200/admin/api/request-key;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        client_max_body_size 16k;
    }
    location = /request-key { try_files /request-key.html =404; }
    location = /verwerkersovereenkomst { try_files /verwerkersovereenkomst.html =404; }
    location = /api/sign-dpa {
        limit_req        zone=api burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000/v2/sign-dpa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For '';
        client_max_body_size 16k;
    }
    location = /status         { try_files /status.html =404; }
    location = /crypto-agility { try_files /crypto-agility.html =404; }
    location = /sla         { try_files /sla.html =404; }
    location = /compliance/nis2    { try_files /compliance/nis2.html =404; }
    location = /compliance/iec62443 { try_files /compliance/iec62443.html =404; }
    location = /compliance/nen7510 { try_files /compliance/nen7510.html =404; }
location = /users.json { deny all; return 404; }    location ~ /.env { deny all; return 404; }    location ~ /.git { deny all; return 404; }

    # Long-lived cache for VERSIONED static assets (links carry ?v=N — enforced by
    # scripts/check-cache-bust.sh). immutable = the browser never revalidates;
    # safe ONLY because a content change ships under a new ?v= URL. Re-includes the
    # security headers (this location sets its own add_header, which would
    # otherwise drop the server-level set). Single Cache-Control now: the old
    # `expires 1y` emitted a second, redundant Cache-Control header.
    location ~* \.(css|js|woff2|woff|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        include snippets/paramant-security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
    error_page 404 /404.html;
    location = /404.html { internal; }
    # DICOM info page (must come before /dicom/ proxy block to avoid nginx
    # auto-redirect /dicom → http://127.0.0.1:8080/dicom/ using internal address)
    location = /dicom { try_files /dicom.html =404; }

    # DICOM Gateway
    location /dicom/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host $host;
        client_max_body_size 50M;
    }


    # Admin panel API proxy (same-origin, geen CORS issues)
    location /rp/health/ {
        client_max_body_size 30M;
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host health.paramant.app;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
    }
    location /rp/legal/ {
        proxy_pass http://127.0.0.1:3003/;
        proxy_http_version 1.1;
        proxy_set_header Host legal.paramant.app;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
    }
    location /rp/finance/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host finance.paramant.app;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
    }
    location /rp/iot/ {
        proxy_pass http://127.0.0.1:3004/;
        proxy_http_version 1.1;
        proxy_set_header Host iot.paramant.app;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header X-Admin-Token $http_x_admin_token;
    }
    # Removed (sec/infra-hardening): the /rp/fly/ block forwarded X-Admin-Token +
    # X-Api-Key to paramant-ghost-pipe.fly.dev over an UNVERIFIED TLS connection
    # (no proxy_ssl_verify) resolving via public DNS — an on-path/DNS-poison
    # attacker could harvest the admin token. It had no live callers (already gone
    # from CSP connect-src). The :8090 Fly server block and /dicom/ gateway are
    # left in place pending an operator decision (the /dicom/ upstream still
    # responds, so "dead" is not confirmed — see audit dossier).


}

server {
    listen 127.0.0.1:8081;
    access_log off;

    location = /outlook/taskpane {
        alias /home/paramant/app/outlook/taskpane.html;
        default_type text/html;
        add_header Access-Control-Allow-Origin "https://outlook.office.com" always;
        add_header Access-Control-Allow-Origin "https://outlook.office365.com" always;
    }
    location = /outlook/commands {
        alias /home/paramant/app/outlook/commands.html;
        default_type text/html;
    }
    location = /outlook/manifest.xml {
        alias /home/paramant/app/outlook/manifest.xml;
        default_type application/xml;
    }
location = /users.json { deny all; return 404; }    location ~ /.env { deny all; return 404; }    location ~ /.git { deny all; return 404; }
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For '';
        proxy_read_timeout 3600s;
    }
}

server {
    listen 127.0.0.1:8086;
    root /home/paramant/app-legal;
    index index.html;
    access_log off;
    # Bound the bulk-upload body and rate the catch-all relay path. Without these
    # the :8086 /v2/ catch-all accepted an unbounded body and unthrottled request
    # rate (the per-endpoint blocks above only cover specific /v2/* paths). 35M
    # mirrors the self-host hardening; the `api` zone is already declared in the
    # main nginx.conf http{} (reused at the /v2/sign-dpa block above).
    location /v2/ {
        client_max_body_size 35M;
        limit_req        zone=api burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_read_timeout 3600s;
    }
    location /health { proxy_pass http://127.0.0.1:3002; }
    location /admin/ { proxy_pass http://127.0.0.1:3002; }

    location = /outlook/taskpane {
        alias /home/paramant/app/outlook/taskpane.html;
        default_type text/html;
        add_header Access-Control-Allow-Origin "https://outlook.office.com" always;
        add_header Access-Control-Allow-Origin "https://outlook.office365.com" always;
    }
    location = /outlook/commands {
        alias /home/paramant/app/outlook/commands.html;
        default_type text/html;
    }
    location = /outlook/manifest.xml {
        alias /home/paramant/app/outlook/manifest.xml;
        default_type application/xml;
    }
location = /users.json { deny all; return 404; }    location ~ /.env { deny all; return 404; }    location ~ /.git { deny all; return 404; }
    location / { try_files $uri $uri.html /index.html; }
}

