app = "paramant-ghost-pipe"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 3

  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"

# Volume exists on existing machines — kept here to avoid deploy conflict.
# Safe to delete after: flyctl volumes list -a paramant-ghost-pipe
# then: flyctl volumes delete <vol-id> for each machine
[[mounts]]
  source = "paramant_users"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
