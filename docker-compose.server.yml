# docker-compose.server.yml — production server notes
#
# The base docker-compose.yml already binds all ports to 127.0.0.1 and is
# production-ready as-is. System nginx (e.g. Let's Encrypt via Certbot) proxies
# inbound TLS traffic to those localhost ports.
#
# Port mapping (host → relay container):
#   relay-main:    127.0.0.1:3000  (relay.paramant.app)
#   relay-health:  127.0.0.1:3001  (health.paramant.app)
#   relay-finance: 127.0.0.1:3002  (finance.paramant.app)
#   relay-legal:   127.0.0.1:3003  (legal.paramant.app)
#   relay-iot:     127.0.0.1:3004  (iot.paramant.app)
#   admin:         127.0.0.1:4200  (/admin/ via nginx)
#
# Usage:
#   docker compose up -d --build
#
# The nginx Cloudflare proxy (if used) should proxy HTTPS → http://127.0.0.1:<port>
# See deploy/nginx-paramant.conf for a reference nginx config.
