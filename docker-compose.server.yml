# docker-compose.server.yml — production server override
# Use when the server already has its own nginx handling TLS (e.g. Let's Encrypt via system nginx)
#
# Usage:
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.server.yml \
#     -f docker-compose.integrations.yml \
#     up -d
#
# What this does:
#   - Disables the Docker-managed nginx (system nginx handles TLS + routing)
#   - Binds relay ports to 127.0.0.1 so system nginx can proxy to them

services:

  # Disable Docker nginx — system nginx handles TLS/routing
  nginx:
    profiles:
      - disabled

  # Bind relay ports to localhost for system nginx to proxy
  relay-health:
    ports:
      - "127.0.0.1:3005:3005"

  relay-legal:
    ports:
      - "127.0.0.1:3002:3002"

  relay-finance:
    ports:
      - "127.0.0.1:3003:3003"

  relay-iot:
    ports:
      - "127.0.0.1:3004:3004"
