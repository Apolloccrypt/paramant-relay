# PARAMANT integrations — Admin panel
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.server.yml -f docker-compose.integrations.yml up -d
#
# Access:
#   SSH tunnel: ssh -L 4200:127.0.0.1:4200 root@<server>  then  http://localhost:4200
#   Or via nginx proxy at https://<DOMAIN>/admin/

services:
  admin:
    build: ./admin
    image: paramant-admin:latest
    restart: unless-stopped
    environment:
      PORT: "4200"
      BASE_PATH: "/admin"
      ADMIN_TOKEN: "${ADMIN_TOKEN}"
      RELAY_HEALTH:  "http://127.0.0.1:3005"
      RELAY_LEGAL:   "http://127.0.0.1:3002"
      RELAY_FINANCE: "http://127.0.0.1:3003"
      RELAY_IOT:     "http://127.0.0.1:3004"
    network_mode: host   # needs 127.0.0.1 access to systemd relay services
